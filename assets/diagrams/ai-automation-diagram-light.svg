  <rect x="38" y="80" width="186" height="5" rx="4" fill="#06b6d4"/>
  <text x="131" y="110" text-anchor="middle" fill="#0891b2" font-size="13" font-weight="700">Claude Code</text>
  <text x="131" y="132" text-anchor="middle" fill="#334155" font-size="10">Agentic CLI with tool use</text>
  <text x="131" y="150" text-anchor="middle" fill="#64748b" font-size="9.5">MCP client · file ops</text>
  <text x="131" y="168" text-anchor="middle" fill="#64748b" font-size="9.5">multi-step tasks</text>
  <text x="131" y="188" text-anchor="middle" fill="#94a3b8" font-size="8.5">AB-900 AI Governance</text>

  <rect x="240" y="80" width="186" height="120" rx="10" fill="url(#card)" stroke="#7c3aed" stroke-width="1.5"/>
