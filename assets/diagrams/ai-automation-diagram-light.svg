  <line x1="131" y1="200" x2="131" y2="248" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#arrowCyan)"/>
  <line x1="333" y1="200" x2="333" y2="248" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrowPurple)"/>
  <line x1="535" y1="200" x2="535" y2="248" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowAmber)"/>
  <line x1="793" y1="200" x2="793" y2="248" stroke="#0d9488" stroke-width="1.8" marker-end="url(#arrowCyan)"/>

