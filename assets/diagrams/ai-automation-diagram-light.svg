  <text x="793" y="150" text-anchor="middle" fill="#64748b" font-size="9.5">OPNsense · Proxmox · AdGuard · NPMplus</text>
  <text x="793" y="168" text-anchor="middle" fill="#64748b" font-size="9.5">Mailcow · Wazuh · Home Assistant</text>
  <text x="793" y="188" text-anchor="middle" fill="#94a3b8" font-size="8.5">Node.js LXC · per-tool auth · zod schemas</text>

