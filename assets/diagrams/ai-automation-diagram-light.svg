  <text x="535" y="150" text-anchor="middle" fill="#64748b" font-size="9.5">stdin prompt mode</text>
  <text x="535" y="168" text-anchor="middle" fill="#64748b" font-size="9.5">--quiet for scripting</text>
  <text x="535" y="188" text-anchor="middle" fill="#94a3b8" font-size="8.5">codex-1 model</text>

