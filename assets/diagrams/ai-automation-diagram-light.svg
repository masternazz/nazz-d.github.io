  <text x="333" y="110" text-anchor="middle" fill="#6d28d9" font-size="13" font-weight="700">Gemini CLI</text>
  <text x="333" y="132" text-anchor="middle" fill="#334155" font-size="10">Google agentic CLI</text>
  <text x="333" y="150" text-anchor="middle" fill="#64748b" font-size="9.5">MCP client · shell tools</text>
  <text x="333" y="168" text-anchor="middle" fill="#64748b" font-size="9.5">--yolo for auto-approve</text>
  <text x="333" y="188" text-anchor="middle" fill="#94a3b8" font-size="8.5">Flash 2.5 model</text>

  <rect x="442" y="80" width="186" height="120" rx="10" fill="url(#card)" stroke="#d97706" stroke-width="1.5"/>
