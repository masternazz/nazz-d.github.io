  <text x="333" y="312" text-anchor="middle" fill="#475569" font-size="9">Repo management via git</text>
  <text x="333" y="330" text-anchor="middle" fill="#94a3b8" font-size="8.5">structured output verification</text>

  <rect x="442" y="248" width="186" height="96" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <rect x="442" y="248" width="186" height="4" rx="4" fill="#d97706"/>
  <text x="535" y="274" text-anchor="middle" fill="#b45309" font-size="11" font-weight="700">Research</text>
  <text x="535" y="294" text-anchor="middle" fill="#475569" font-size="9">Agentic hang analysis</text>
  <text x="535" y="312" text-anchor="middle" fill="#475569" font-size="9">Prompt injection testing</text>
  <text x="535" y="330" text-anchor="middle" fill="#94a3b8" font-size="8.5">subprocess behavior study</text>

  <rect x="644" y="248" width="298" height="96" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.2"/>
  <rect x="644" y="248" width="298" height="4" rx="4" fill="#0d9488"/>
  <text x="793" y="274" text-anchor="middle" fill="#0f766e" font-size="11" font-weight="700">MCP Workflow</text>
  <text x="793" y="294" text-anchor="middle" fill="#475569" font-size="9">AI client calls tool → structured result</text>
  <text x="793" y="312" text-anchor="middle" fill="#475569" font-size="9">no terminal switching · no copy-paste</text>
  <text x="793" y="330" text-anchor="middle" fill="#94a3b8" font-size="8.5">real homelab ops through MCP protocol</text>

  <!-- Bottom summary bar -->
  <rect x="38" y="376" width="904" height="80" rx="12" fill="url(#card)" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="38" y="376" width="904" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="404" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700">What This Research Covers</text>
  <text x="210" y="428" text-anchor="middle" fill="#0891b2" font-size="10">How each CLI handles agentic vs. direct prompt modes</text>
  <text x="210" y="446" text-anchor="middle" fill="#94a3b8" font-size="9">spawn behavior · stdin vs. arg · timeout patterns</text>
  <text x="570" y="428" text-anchor="middle" fill="#6d28d9" font-size="10">MCP as the integration layer for AI + infrastructure</text>
  <text x="570" y="446" text-anchor="middle" fill="#94a3b8" font-size="9">real tasks completed in production lab environment</text>
  <text x="840" y="428" text-anchor="middle" fill="#b45309" font-size="10">AB-900 AI Governance certified</text>
  <text x="840" y="446" text-anchor="middle" fill="#94a3b8" font-size="9">responsible agentic deployment</text>

  <!-- Key insight box -->
  <rect x="38" y="480" width="904" height="48" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="490" y="500" text-anchor="middle" fill="#475569" font-size="10" font-weight="600">Key Finding</text>
  <text x="490" y="518" text-anchor="middle" fill="#94a3b8" font-size="9">Each CLI has distinct agentic behavior — understanding subprocess patterns, hang conditions, and prompt injection is prerequisite to reliable automated use</text>
