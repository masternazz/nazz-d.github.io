<svg width="980" height="580" viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#ef4444"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22c55e"/>
    </marker>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="980" height="580" fill="url(#bg)"/>
  <rect width="980" height="580" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Wazuh SIEM / XDR</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Endpoint visibility · network threat correlation · alert triage · sanitized for public viewing</text>

  <!-- Sources label -->
  <text x="130" y="74" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="700" letter-spacing="1">MONITORED ENDPOINTS</text>

  <!-- Connector paths drawn FIRST so source/center/output boxes cover them -->
  <!-- Left sources → Wazuh Manager center -->
  <path d="M230,113 L285,113 L285,248 L338,248" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linejoin="round" opacity="0.7" marker-end="url(#arrPurple)"/>
  <path d="M230,189 L295,189 L295,268 L338,268" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-linejoin="round" opacity="0.7" marker-end="url(#arrPurple)"/>
  <line x1="230" y1="265" x2="338" y2="265" stroke="#6366f1" stroke-width="1.5" opacity="0.7" marker-end="url(#arrPurple)"/>
  <path d="M230,341 L295,341 L295,288 L338,288" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round" opacity="0.7" marker-end="url(#arrPurple)"/>

  <!-- Wazuh → output paths drawn before output boxes -->
  <path d="M642,210 L700,210 L700,120 L750,120" fill="none" stroke="#8b5cf6" stroke-width="1.8" stroke-linejoin="round" opacity="0.75" marker-end="url(#arrPurple)"/>
  <line x1="642" y1="270" x2="750" y2="270" stroke="#ef4444" stroke-width="1.8" opacity="0.75" marker-end="url(#arrRed)"/>
  <path d="M642,340 L700,340 L700,416 L750,416" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linejoin="round" opacity="0.75" marker-end="url(#arrGreen)"/>

  <!-- Source boxes -->
  <rect x="30" y="82" width="200" height="62" rx="9" fill="#0b1220" stroke="#22d3ee" stroke-width="1.4"/>
  <rect x="30" y="82" width="200" height="4" rx="4" fill="#22d3ee"/>
  <text x="130" y="105" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">OPNsense — Suricata</text>
  <text x="130" y="122" text-anchor="middle" fill="#94a3b8" font-size="9">WAN netmap IDS · syslog</text>
  <text x="130" y="137" text-anchor="middle" fill="#64748b" font-size="8.5">Network intrusion alerts → Wazuh</text>

  <rect x="30" y="158" width="200" height="62" rx="9" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.4"/>
  <rect x="30" y="158" width="200" height="4" rx="4" fill="#8b5cf6"/>
  <text x="130" y="181" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Linux LXC Containers</text>
  <text x="130" y="198" text-anchor="middle" fill="#94a3b8" font-size="9">Wazuh agent · auth · syscall</text>
  <text x="130" y="213" text-anchor="middle" fill="#64748b" font-size="8.5">SSH · sudo · cron · file changes</text>

  <rect x="30" y="234" width="200" height="62" rx="9" fill="#0b1220" stroke="#6366f1" stroke-width="1.4"/>
  <rect x="30" y="234" width="200" height="4" rx="4" fill="#6366f1"/>
  <text x="130" y="257" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="700">Windows Hosts</text>
  <text x="130" y="274" text-anchor="middle" fill="#94a3b8" font-size="9">Wazuh agent · Windows Event Log</text>
  <text x="130" y="289" text-anchor="middle" fill="#64748b" font-size="8.5">Logon · process · Defender events</text>

  <rect x="30" y="310" width="200" height="62" rx="9" fill="#0b1220" stroke="#7c3aed" stroke-width="1.4"/>
  <rect x="30" y="310" width="200" height="4" rx="4" fill="#7c3aed"/>
  <text x="130" y="333" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Infrastructure Services</text>
  <text x="130" y="350" text-anchor="middle" fill="#94a3b8" font-size="9">Authentik · NPMplus · NAS</text>
  <text x="130" y="365" text-anchor="middle" fill="#64748b" font-size="8.5">Auth events · access logs</text>

  <!-- Wazuh Manager center -->
  <rect x="338" y="188" width="304" height="162" rx="12" fill="url(#card)" stroke="#8b5cf6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="338" y="188" width="304" height="5" rx="4" fill="#8b5cf6"/>
  <text x="490" y="215" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">Wazuh Manager</text>
  <text x="490" y="233" text-anchor="middle" fill="#e5e7eb" font-size="10.5" font-weight="600">SIEM / XDR — LXC on Proxmox</text>
  <text x="490" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">Rule-based event correlation</text>
  <text x="490" y="269" text-anchor="middle" fill="#94a3b8" font-size="9">Agent management · log indexing</text>
  <text x="490" y="284" text-anchor="middle" fill="#94a3b8" font-size="9">File integrity monitoring (FIM)</text>
  <text x="490" y="299" text-anchor="middle" fill="#94a3b8" font-size="9">Vulnerability detection · compliance</text>
  <text x="490" y="314" text-anchor="middle" fill="#64748b" font-size="8.5">Active response + alert enrichment</text>
  <text x="490" y="343" text-anchor="middle" fill="#64748b" font-size="8.5">LDAP auth via Authentik outpost</text>

  <!-- Outputs label -->
  <text x="856" y="74" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-weight="700" letter-spacing="1">OUTPUTS</text>

  <!-- Dashboard -->
  <rect x="750" y="82" width="200" height="68" rx="9" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="750" y="82" width="200" height="4" rx="4" fill="#8b5cf6"/>
  <text x="850" y="107" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Wazuh Dashboard</text>
  <text x="850" y="124" text-anchor="middle" fill="#94a3b8" font-size="9">Kibana-based · alert browser</text>
  <text x="850" y="141" text-anchor="middle" fill="#64748b" font-size="8.5">Event drill-down · rule explorer</text>

  <!-- Alert Triage -->
  <rect x="750" y="240" width="200" height="68" rx="9" fill="#0b1220" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="750" y="240" width="200" height="4" rx="4" fill="#ef4444"/>
  <text x="850" y="265" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Alert Triage Workflow</text>
  <text x="850" y="282" text-anchor="middle" fill="#94a3b8" font-size="9">Identify · contextualize · classify</text>
  <text x="850" y="299" text-anchor="middle" fill="#64748b" font-size="8.5">Expected / misconfigured / escalate</text>

  <!-- Investigation Notes -->
  <rect x="750" y="390" width="200" height="68" rx="9" fill="url(#card)" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="750" y="390" width="200" height="4" rx="4" fill="#22c55e"/>
  <text x="850" y="415" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">Investigation Notes</text>
  <text x="850" y="432" text-anchor="middle" fill="#94a3b8" font-size="9">Evidence · impact · next steps</text>
  <text x="850" y="449" text-anchor="middle" fill="#64748b" font-size="8.5">Runbook-style SOC documentation</text>

  <!-- Bottom banner -->
  <rect x="30" y="500" width="920" height="50" rx="10" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="30" y="500" width="920" height="4" rx="4" fill="url(#bar)"/>
  <text x="490" y="523" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Suricata (WAN) + Wazuh agents → correlated alerts across network and host layers</text>
  <text x="490" y="542" text-anchor="middle" fill="#64748b" font-size="8.5">Sanitized for public viewing · no rule IDs, alert thresholds, or agent counts published</text>
</svg>
