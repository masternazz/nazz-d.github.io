  <text x="848" y="144" text-anchor="middle" fill="#cbd5e1" font-size="10">Metadata extraction</text>
  <text x="848" y="162" text-anchor="middle" fill="#cbd5e1" font-size="10">Reverse image search</text>
  <text x="848" y="180" text-anchor="middle" fill="#cbd5e1" font-size="10">Social footprint mapping</text>
  <text x="848" y="202" text-anchor="middle" fill="#64748b" font-size="8.5">ExifTool · Google Maps correlation</text>

