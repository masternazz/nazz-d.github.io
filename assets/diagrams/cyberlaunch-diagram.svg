  <rect x="38" y="76" width="200" height="5" rx="4" fill="#ef4444"/>
  <text x="138" y="104" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">Reconnaissance</text>
  <text x="138" y="126" text-anchor="middle" fill="#cbd5e1" font-size="10">Nmap port scanning</text>
  <text x="138" y="144" text-anchor="middle" fill="#cbd5e1" font-size="10">Service version detection</text>
  <text x="138" y="162" text-anchor="middle" fill="#cbd5e1" font-size="10">OS fingerprinting</text>
  <text x="138" y="180" text-anchor="middle" fill="#cbd5e1" font-size="10">Attack surface mapping</text>
  <text x="138" y="202" text-anchor="middle" fill="#64748b" font-size="8.5">Kali Linux environment</text>

  <line x1="238" y1="146" x2="276" y2="146" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>

