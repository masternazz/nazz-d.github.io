  <text x="318" y="378" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Challenge Categories</text>
  <text x="135" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Web Exploitation</text>
  <text x="246" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Binary / Pwn</text>
  <text x="357" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Forensics</text>
  <text x="468" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">Cryptography</text>
  <text x="579" y="400" text-anchor="middle" fill="#94a3b8" font-size="9">OSINT</text>
  <text x="135" y="416" text-anchor="middle" fill="#64748b" font-size="8">SQLi · XSS · LFI</text>
  <text x="246" y="416" text-anchor="middle" fill="#64748b" font-size="8">Buffer overflows</text>
  <text x="357" y="416" text-anchor="middle" fill="#64748b" font-size="8">File carving · steganography</text>
  <text x="468" y="416" text-anchor="middle" fill="#64748b" font-size="8">Hash cracking · RSA</text>
  <text x="579" y="416" text-anchor="middle" fill="#64748b" font-size="8">Image geo · social</text>

  <!-- Competition details -->
  <rect x="614" y="354" width="328" height="80" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="614" y="354" width="328" height="5" rx="4" fill="#22d3ee"/>
  <text x="778" y="378" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Competition Details</text>
  <text x="778" y="400" text-anchor="middle" fill="#cbd5e1" font-size="10">State Championship — USF Tampa</text>
  <text x="778" y="418" text-anchor="middle" fill="#64748b" font-size="9">Florida's largest state-sponsored high school CTF</text>
  <text x="778" y="432" text-anchor="middle" fill="#64748b" font-size="9">Time-limited · team format · jeopardy style</text>

  <!-- Key outcome -->
  <rect x="38" y="456" width="904" height="60" rx="10" fill="url(#card)" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="38" y="456" width="904" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="480" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Methodology Applied</text>
  <text x="490" y="500" text-anchor="middle" fill="#94a3b8" font-size="10">Recon → Exploit → Post-Exploit → Pivot → Document: structured attack methodology under competition time pressure</text>
