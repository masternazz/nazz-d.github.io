  <text x="490" y="268" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700">Tools &amp; Environment</text>
  <text x="175" y="294" text-anchor="middle" fill="#fca5a5" font-size="10">Kali Linux</text>
  <text x="175" y="311" text-anchor="middle" fill="#64748b" font-size="8.5">Primary attack platform</text>
  <text x="340" y="294" text-anchor="middle" fill="#c4b5fd" font-size="10">Metasploit + Nmap</text>
  <text x="340" y="311" text-anchor="middle" fill="#64748b" font-size="8.5">Recon and exploit framework</text>
  <text x="490" y="294" text-anchor="middle" fill="#67e8f9" font-size="10">Hashcat + John the Ripper</text>
  <text x="490" y="311" text-anchor="middle" fill="#64748b" font-size="8.5">Password cracking tools</text>
  <text x="660" y="294" text-anchor="middle" fill="#fcd34d" font-size="10">ExifTool + OSINT techniques</text>
  <text x="660" y="311" text-anchor="middle" fill="#64748b" font-size="8.5">Image and metadata analysis</text>
  <text x="840" y="294" text-anchor="middle" fill="#86efac" font-size="10">Burp Suite + Wireshark</text>
  <text x="840" y="311" text-anchor="middle" fill="#64748b" font-size="8.5">Web and packet analysis</text>

