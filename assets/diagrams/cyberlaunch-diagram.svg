  <rect x="276" y="76" width="200" height="140" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="276" y="76" width="200" height="5" rx="4" fill="#8b5cf6"/>
  <text x="376" y="104" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Exploitation</text>
  <text x="376" y="126" text-anchor="middle" fill="#cbd5e1" font-size="10">Metasploit Framework</text>
  <text x="376" y="144" text-anchor="middle" fill="#cbd5e1" font-size="10">SMB vulnerability exploit</text>
  <text x="376" y="162" text-anchor="middle" fill="#cbd5e1" font-size="10">Shell access and pivot</text>
