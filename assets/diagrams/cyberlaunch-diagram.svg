  <text x="376" y="202" text-anchor="middle" fill="#64748b" font-size="8.5">EternalBlue / SMBv1 exploits</text>

  <line x1="476" y1="146" x2="514" y2="146" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

