<svg width="1100" height="680" viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a18"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="40%" stop-color="#22d3ee"/>
      <stop offset="70%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9333ea" stroke-width="0.15" opacity="0.22"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#9333ea" opacity="0.9"/>
    </marker>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22d3ee" opacity="0.9"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22c55e" opacity="0.9"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#ef4444" opacity="0.9"/>
    </marker>
  </defs>

  <rect width="1100" height="680" fill="url(#bg)"/>
  <rect width="1100" height="680" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#purpleBar)"/>

  <text x="550" y="34" text-anchor="middle" fill="#e2d9f3" font-size="15" font-weight="700" letter-spacing="2">GUEST CAPTIVE PORTAL — VLAN 8</text>
  <text x="550" y="52" text-anchor="middle" fill="#4b4266" font-size="10" letter-spacing="1">OPNsense portal enforcement · internet-only guest access · internal-network blocking</text>

  <!-- Row 1: Guest Device → Guest SSID → OPNsense → Internet -->

  <!-- Guest Device -->
  <rect x="40" y="76" width="200" height="100" rx="9" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.6"/>
  <rect x="40" y="76" width="200" height="4" rx="3" fill="#8b5cf6"/>
  <text x="140" y="103" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Guest Device</text>
  <text x="140" y="121" text-anchor="middle" fill="#7c6a99" font-size="9.5">Phone or laptop</text>
  <text x="140" y="138" text-anchor="middle" fill="#7c6a99" font-size="9">Joins guest SSID</text>
  <text x="140" y="165" text-anchor="middle" fill="#6d28d9" font-size="8" font-style="italic">receives guest DHCP lease</text>

  <line x1="240" y1="126" x2="290" y2="126" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrPurple)"/>

  <!-- Guest SSID -->
  <rect x="290" y="76" width="200" height="100" rx="9" fill="url(#card)" stroke="#22d3ee" stroke-width="1.6"/>
  <rect x="290" y="76" width="200" height="4" rx="3" fill="#22d3ee"/>
  <text x="390" y="103" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Guest SSID</text>
  <text x="390" y="121" text-anchor="middle" fill="#4b8a99" font-size="9.5">Tagged VLAN 8</text>
  <text x="390" y="138" text-anchor="middle" fill="#4b8a99" font-size="9">AP trunk carries guest traffic</text>
  <text x="390" y="165" text-anchor="middle" fill="#0e7490" font-size="8" font-style="italic">802.1Q tag applied at AP</text>

  <line x1="490" y1="126" x2="540" y2="126" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arrCyan)"/>

  <!-- OPNsense -->
  <rect x="540" y="66" width="240" height="120" rx="9" fill="url(#card)" stroke="#9333ea" stroke-width="2.2" filter="url(#glow)"/>
  <rect x="540" y="66" width="240" height="5" rx="3" fill="url(#purpleBar)"/>
  <text x="660" y="96" text-anchor="middle" fill="#e2d9f3" font-size="13" font-weight="700">OPNsense</text>
  <text x="660" y="114" text-anchor="middle" fill="#9b85d4" font-size="10">Guest_Portal zone · opt8 / Guest</text>
  <text x="660" y="131" text-anchor="middle" fill="#7c6a99" font-size="9">DHCP lease: 8 hours</text>
  <text x="660" y="148" text-anchor="middle" fill="#7c6a99" font-size="9">Portal idle: 30 min · hard: 8 hr</text>
  <text x="660" y="175" text-anchor="middle" fill="#6d28d9" font-size="8" font-style="italic">portal zone bound to Guest interface</text>

  <line x1="780" y1="116" x2="830" y2="116" stroke="#22c55e" stroke-width="1.8" marker-end="url(#arrGreen)"/>

  <!-- Internet -->
  <rect x="830" y="76" width="230" height="100" rx="9" fill="url(#card)" stroke="#22c55e" stroke-width="1.6"/>
  <rect x="830" y="76" width="230" height="4" rx="3" fill="#22c55e"/>
  <text x="945" y="103" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Internet</text>
  <text x="945" y="121" text-anchor="middle" fill="#4a8a5a" font-size="9.5">Allowed after portal auth</text>
  <text x="945" y="138" text-anchor="middle" fill="#4a8a5a" font-size="9">Full WAN access</text>
  <text x="945" y="165" text-anchor="middle" fill="#15803d" font-size="8" font-style="italic">ALLOWED</text>

  <!-- OPNsense down arrow to portal -->
  <line x1="660" y1="186" x2="660" y2="236" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>

  <!-- Captive Portal -->
  <rect x="490" y="236" width="340" height="100" rx="9" fill="url(#card)" stroke="#9333ea" stroke-width="1.8" filter="url(#glow)"/>
  <rect x="490" y="236" width="340" height="4" rx="3" fill="#9333ea"/>
  <text x="660" y="263" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Captive Portal</text>
  <text x="660" y="281" text-anchor="middle" fill="#9b85d4" font-size="9.5">Click-to-connect · anonymous guest session</text>
  <text x="660" y="298" text-anchor="middle" fill="#7c6a99" font-size="9">Idle timeout: 30 min · Hard timeout: 8 hr</text>
  <text x="660" y="325" text-anchor="middle" fill="#6d28d9" font-size="8" font-style="italic">session aligned with DHCP lease window</text>

  <!-- Blocked arrow: OPNsense to Internal -->
  <line x1="780" y1="156" x2="900" y2="280" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrRed)"/>

  <!-- Internal (blocked) -->
  <rect x="830" y="236" width="230" height="100" rx="9" fill="url(#card)" stroke="#ef4444" stroke-width="1.6"/>
  <rect x="830" y="236" width="230" height="4" rx="3" fill="#ef4444"/>
  <text x="945" y="263" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">Internal Network</text>
  <text x="945" y="281" text-anchor="middle" fill="#7a3a3a" font-size="9.5">Management · Storage · Apps</text>
  <text x="945" y="298" text-anchor="middle" fill="#7a3a3a" font-size="9">Private VLANs</text>
  <text x="945" y="325" text-anchor="middle" fill="#991b1b" font-size="8" font-style="italic">BLOCKED — RFC1918 unreachable</text>

  <!-- Root cause section -->
  <rect x="40" y="236" width="430" height="100" rx="9" fill="#0b1220" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="40" y="236" width="430" height="4" rx="3" fill="#f59e0b"/>
  <text x="255" y="261" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Root Cause Found and Fixed</text>
  <text x="255" y="279" text-anchor="middle" fill="#94a3b8" font-size="9">Portal zone was bound to Network Services interface</text>
  <text x="255" y="296" text-anchor="middle" fill="#94a3b8" font-size="9">instead of the actual Guest interface (opt8)</text>
  <text x="255" y="313" text-anchor="middle" fill="#78716c" font-size="8.5">Clients could bypass portal — fix: rebind Guest_Portal to opt8</text>
  <text x="255" y="325" text-anchor="middle" fill="#57534e" font-size="8" font-style="italic">reconfigured captive portal service after binding update</text>

  <!-- Validation checklist -->
  <rect x="40" y="360" width="1020" height="130" rx="12" fill="#0b1220" stroke="#2d1f44" stroke-width="1.2"/>
  <rect x="40" y="360" width="1020" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="387" text-anchor="middle" fill="#e2d9f3" font-size="12" font-weight="700">Validation Checklist</text>

  <!-- 4 chips -->
  <rect x="70" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.3"/>
  <rect x="70" y="400" width="220" height="4" rx="3" fill="#22c55e"/>
  <text x="180" y="422" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">Guest DHCP Lease</text>
  <text x="180" y="440" text-anchor="middle" fill="#4a8a5a" font-size="8.5">Client receives guest pool address</text>

  <rect x="310" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.3"/>
  <rect x="310" y="400" width="220" height="4" rx="3" fill="#22c55e"/>
  <text x="420" y="422" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">Portal Session Active</text>
  <text x="420" y="440" text-anchor="middle" fill="#4a8a5a" font-size="8.5">Anonymous session in Guest zone</text>

  <rect x="550" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.3"/>
  <rect x="550" y="400" width="220" height="4" rx="3" fill="#22c55e"/>
  <text x="660" y="422" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">Internet Access</text>
  <text x="660" y="440" text-anchor="middle" fill="#4a8a5a" font-size="8.5">WAN reachable after auth</text>

  <rect x="790" y="400" width="250" height="48" rx="8" fill="url(#card)" stroke="#ef4444" stroke-width="1.3"/>
  <rect x="790" y="400" width="250" height="4" rx="3" fill="#ef4444"/>
  <text x="915" y="422" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">Internal Blocked</text>
  <text x="915" y="440" text-anchor="middle" fill="#7a3a3a" font-size="8.5">Private VLANs unreachable from guest</text>

  <text x="550" y="478" text-anchor="middle" fill="#4b3f66" font-size="8" font-style="italic">Stale bypass sessions cleared · old DHCP artifacts on wrong interface removed · portal service reconfigured</text>

  <!-- Footer -->
  <rect x="40" y="510" width="1020" height="50" rx="8" fill="#0a0818" stroke="#1e1a2e" stroke-width="1"/>
  <text x="550" y="532" text-anchor="middle" fill="#4b4266" font-size="8.5">Traffic path: Guest Device → Guest SSID (VLAN 8) → OPNsense Guest_Portal zone → Captive Portal auth → Internet</text>
  <text x="550" y="549" text-anchor="middle" fill="#2d2540" font-size="8" font-style="italic">Public-safe diagram · private addressing, subnet details, and host IPs omitted</text>
</svg>
