<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Gigabit Switching &amp; PoE+ Deployment</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Cisco SG300-20 core + Netgear GS728TP access — 802.1Q trunking · LACP · VLAN segmentation</text>

  <!-- OPNsense at top -->
  <rect x="340" y="76" width="300" height="72" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="340" y="76" width="300" height="5" rx="4" fill="#8b5cf6"/>
  <text x="490" y="103" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">OPNsense Firewall</text>
  <text x="490" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">Default-deny · VLAN routing · inter-VLAN enforcement</text>
  <text x="490" y="138" text-anchor="middle" fill="#64748b" font-size="9">Trunk uplink on em0 · all VLANs tagged</text>

  <!-- Down to core switch -->
  <line x1="490" y1="148" x2="490" y2="188" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="530" y="172" fill="#c4b5fd" font-size="9">trunk · all VLANs</text>

  <!-- Core switch -->
  <rect x="240" y="188" width="500" height="88" rx="10" fill="url(#card)" stroke="#3b82f6" stroke-width="2"/>
  <rect x="240" y="188" width="500" height="5" rx="4" fill="#3b82f6"/>
  <text x="490" y="216" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Cisco SG300-20 (Core)</text>
  <text x="490" y="236" text-anchor="middle" fill="#cbd5e1" font-size="10">20-port L3 Gigabit · 802.1Q · STP · LACP · inter-VLAN routing</text>
  <text x="490" y="254" text-anchor="middle" fill="#94a3b8" font-size="9.5">All 10 VLANs trunked upward · access downlinks to servers and AP</text>
  <text x="490" y="268" text-anchor="middle" fill="#64748b" font-size="9">Replaced legacy Cisco Catalyst 2950 FastEthernet core</text>

  <!-- Down from core to access switch and servers -->
  <line x1="320" y1="276" x2="200" y2="326" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <line x1="490" y1="276" x2="490" y2="326" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="660" y1="276" x2="780" y2="326" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="235" y="308" fill="#06b6d4" font-size="9">trunk</text>
  <text x="500" y="308" fill="#93c5fd" font-size="9">access</text>
  <text x="710" y="308" fill="#86efac" font-size="9">access</text>

  <!-- Access switch -->
  <rect x="60" y="326" width="280" height="80" rx="10" fill="url(#card)" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="60" y="326" width="280" height="5" rx="4" fill="#06b6d4"/>
  <text x="200" y="352" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Netgear GS728TP (Access)</text>
  <text x="200" y="372" text-anchor="middle" fill="#cbd5e1" font-size="10">28-port PoE+ L2 Gigabit — 380W PoE budget</text>
  <text x="200" y="390" text-anchor="middle" fill="#64748b" font-size="9">Replaced Netgear GS748T FastEthernet access</text>

  <!-- Server infrastructure -->
  <rect x="356" y="326" width="268" height="80" rx="10" fill="url(#card)" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="356" y="326" width="268" height="5" rx="4" fill="#3b82f6"/>
  <text x="490" y="352" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Server Infrastructure</text>
  <text x="490" y="372" text-anchor="middle" fill="#cbd5e1" font-size="10">Proxmox 3-node cluster · IBM M4 · Dell R610/R410</text>
  <text x="490" y="390" text-anchor="middle" fill="#64748b" font-size="9">Gigabit NICs · VLAN tagging at hypervisor level</text>

  <!-- PoE devices -->
  <rect x="640" y="326" width="300" height="80" rx="10" fill="url(#card)" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="640" y="326" width="300" height="5" rx="4" fill="#22c55e"/>
  <text x="790" y="352" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">PoE+ Devices</text>
  <text x="790" y="372" text-anchor="middle" fill="#cbd5e1" font-size="10">Ubiquiti AP · IP cameras · VoIP</text>
  <text x="790" y="390" text-anchor="middle" fill="#64748b" font-size="9">Zero-cable-run deployment from Netgear switch</text>

  <!-- Bottom summary -->
  <rect x="60" y="438" width="860" height="80" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.2"/>
  <rect x="60" y="438" width="860" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="464" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700">Migration Outcomes</text>
  <text x="200" y="488" text-anchor="middle" fill="#93c5fd" font-size="10">100 Mbps → 1 Gbps fabric</text>
  <text x="200" y="504" text-anchor="middle" fill="#64748b" font-size="9">full-duplex end-to-end</text>
  <text x="490" y="488" text-anchor="middle" fill="#5eead4" font-size="10">802.1Q trunking with 10 VLANs</text>
  <text x="490" y="504" text-anchor="middle" fill="#64748b" font-size="9">all segments properly isolated</text>
  <text x="790" y="488" text-anchor="middle" fill="#86efac" font-size="10">PoE+ powering all wireless APs</text>
  <text x="790" y="504" text-anchor="middle" fill="#64748b" font-size="9">380W budget · no wall adapters</text>
</svg>
