<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.24"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.2">OPNsense OIDC + DNS Migration</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Service configs move from hardcoded addresses to stable internal DNS names</text>

  <rect x="54" y="94" width="250" height="122" rx="10" fill="url(#card)" stroke="#ef4444" stroke-width="1.4"/>
  <rect x="54" y="94" width="250" height="5" rx="4" fill="#ef4444"/>
  <text x="179" y="123" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">Before</text>
  <text x="179" y="148" text-anchor="middle" fill="#e5e7eb" font-size="10">LDAP, OIDC, and backup configs</text>
  <text x="179" y="166" text-anchor="middle" fill="#e5e7eb" font-size="10">pointed at raw service locations</text>
  <text x="179" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">renumbering caused brittle configs</text>

  <rect x="365" y="94" width="250" height="122" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.4"/>
  <rect x="365" y="94" width="250" height="5" rx="4" fill="#22d3ee"/>
  <text x="490" y="123" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Internal DNS</text>
  <text x="490" y="148" text-anchor="middle" fill="#e5e7eb" font-size="10">AdGuard Home rewrites</text>
  <text x="490" y="166" text-anchor="middle" fill="#e5e7eb" font-size="10">map service names to private targets</text>
  <text x="490" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">exact addresses remain private</text>

  <rect x="676" y="94" width="250" height="122" rx="10" fill="url(#card)" stroke="#22c55e" stroke-width="1.4"/>
  <rect x="676" y="94" width="250" height="5" rx="4" fill="#22c55e"/>
  <text x="801" y="123" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">After</text>
  <text x="801" y="148" text-anchor="middle" fill="#e5e7eb" font-size="10">OPNsense uses service DNS names</text>
  <text x="801" y="166" text-anchor="middle" fill="#e5e7eb" font-size="10">for Authentik and backup targets</text>
  <text x="801" y="188" text-anchor="middle" fill="#94a3b8" font-size="9">move one service, update one DNS record</text>

  <line x1="304" y1="155" x2="361" y2="155" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="615" y1="155" x2="672" y2="155" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="84" y="276" width="812" height="190" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.2"/>
  <rect x="84" y="276" width="812" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="304" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="700">OIDC Button Fix</text>
  <text x="490" y="324" text-anchor="middle" fill="#94a3b8" font-size="10">The login flow was valid; the plugin UI failed to render the provider selector</text>

  <g fill="url(#card)" stroke-width="1.4">
    <rect x="126" y="356" width="160" height="66" rx="9" stroke="#8b5cf6"/>
    <rect x="318" y="356" width="160" height="66" rx="9" stroke="#22d3ee"/>
    <rect x="510" y="356" width="160" height="66" rx="9" stroke="#f59e0b"/>
    <rect x="702" y="356" width="160" height="66" rx="9" stroke="#22c55e"/>
  </g>
  <text x="206" y="383" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Bug Found</text>
  <text x="206" y="402" text-anchor="middle" fill="#94a3b8" font-size="9">SimpleXML iteration</text>
  <text x="398" y="383" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">Patch Built</text>
  <text x="398" y="402" text-anchor="middle" fill="#94a3b8" font-size="9">FreeBSD package</text>
  <text x="590" y="383" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Installed Safely</text>
  <text x="590" y="402" text-anchor="middle" fill="#94a3b8" font-size="9">configd action path</text>
  <text x="782" y="383" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">SSO Works</text>
  <text x="782" y="402" text-anchor="middle" fill="#94a3b8" font-size="9">Authentik callback</text>

  <line x1="286" y1="389" x2="314" y2="389" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="478" y1="389" x2="506" y2="389" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="670" y1="389" x2="698" y2="389" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <rect x="164" y="491" width="652" height="34" rx="8" fill="#101827" stroke="#475569" stroke-width="1"/>
  <text x="490" y="512" text-anchor="middle" fill="#cbd5e1" font-size="10">Public-safe diagram: provider URLs and internal service addresses are intentionally abstracted.</text>
</svg>
