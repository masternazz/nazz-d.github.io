<svg width="1100" height="740" viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="33%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1100" height="740" fill="url(#bg)"/>
  <rect width="1100" height="740" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#bar)"/>

  <text x="550" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Flat Network to Segmented Production</text>
  <text x="550" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">Migration story shown without private subnets, host addresses, or switch port IDs</text>

  <rect x="58" y="92" width="300" height="180" rx="12" fill="#0b1220" stroke="#ef4444" stroke-width="1.4"/>
  <rect x="58" y="92" width="300" height="5" rx="4" fill="#ef4444"/>
  <text x="208" y="124" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">Before</text>
  <text x="208" y="154" text-anchor="middle" fill="#e5e7eb" font-size="11">Single flat private network</text>
  <text x="208" y="176" text-anchor="middle" fill="#94a3b8" font-size="9">Proxmox, storage, SIEM, services, IoT</text>
  <text x="208" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">shared one broadcast domain</text>
  <text x="208" y="224" text-anchor="middle" fill="#fca5a5" font-size="9">No clear blast-radius control</text>
  <text x="208" y="242" text-anchor="middle" fill="#fca5a5" font-size="9">Legacy DMZ path existed separately</text>

  <rect x="400" y="92" width="300" height="180" rx="12" fill="#0b1220" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="400" y="92" width="300" height="5" rx="4" fill="#f59e0b"/>
  <text x="550" y="124" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">Migration Work</text>
  <text x="550" y="154" text-anchor="middle" fill="#e5e7eb" font-size="11">Switch hardware swap</text>
  <text x="550" y="176" text-anchor="middle" fill="#94a3b8" font-size="9">core/access trunks rebuilt</text>
  <text x="550" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">Proxmox quorum restored</text>
  <text x="550" y="224" text-anchor="middle" fill="#fcd34d" font-size="9">DNS, NAT, proxy, storage, firewall</text>
  <text x="550" y="242" text-anchor="middle" fill="#fcd34d" font-size="9">updated in coordinated waves</text>

  <rect x="742" y="92" width="300" height="180" rx="12" fill="#0b1220" stroke="#22c55e" stroke-width="1.4"/>
  <rect x="742" y="92" width="300" height="5" rx="4" fill="#22c55e"/>
  <text x="892" y="124" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">After</text>
  <text x="892" y="154" text-anchor="middle" fill="#e5e7eb" font-size="11">Role-based private VLANs</text>
  <text x="892" y="176" text-anchor="middle" fill="#94a3b8" font-size="9">management, DMZ, services, storage, SIEM</text>
  <text x="892" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">plus guest, IoT, testing, OOB zones</text>
  <text x="892" y="224" text-anchor="middle" fill="#86efac" font-size="9">Default-deny firewall policy</text>
  <text x="892" y="242" text-anchor="middle" fill="#86efac" font-size="9">explicit allows per traffic path</text>

  <line x1="358" y1="182" x2="396" y2="182" stroke="#8b5cf6" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="700" y1="182" x2="738" y2="182" stroke="#22c55e" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <rect x="80" y="330" width="940" height="170" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.1"/>
  <rect x="80" y="330" width="940" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="360" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="700">Cutover Dependency Chain</text>
  <text x="550" y="380" text-anchor="middle" fill="#94a3b8" font-size="10">Each service moved only after its address, DNS, proxy, firewall, and app dependencies were lined up</text>

  <g fill="url(#card)" stroke-width="1.3">
    <rect x="112" y="414" width="130" height="52" rx="8" stroke="#3b82f6"/>
    <rect x="277" y="414" width="130" height="52" rx="8" stroke="#8b5cf6"/>
    <rect x="442" y="414" width="130" height="52" rx="8" stroke="#22d3ee"/>
    <rect x="607" y="414" width="130" height="52" rx="8" stroke="#14b8a6"/>
    <rect x="772" y="414" width="130" height="52" rx="8" stroke="#f59e0b"/>
  </g>
  <text x="177" y="437" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="700">DHCP / IPAM</text>
  <text x="177" y="453" text-anchor="middle" fill="#94a3b8" font-size="8">new reservation</text>
  <text x="342" y="437" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">Proxmox</text>
  <text x="342" y="453" text-anchor="middle" fill="#94a3b8" font-size="8">VLAN tag</text>
  <text x="507" y="437" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">DNS</text>
  <text x="507" y="453" text-anchor="middle" fill="#94a3b8" font-size="8">host override</text>
  <text x="672" y="437" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="700">Reverse Proxy</text>
  <text x="672" y="453" text-anchor="middle" fill="#94a3b8" font-size="8">backend target</text>
  <text x="837" y="437" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Firewall</text>
  <text x="837" y="453" text-anchor="middle" fill="#94a3b8" font-size="8">explicit allow</text>

  <line x1="242" y1="440" x2="273" y2="440" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="407" y1="440" x2="438" y2="440" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="572" y1="440" x2="603" y2="440" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="737" y1="440" x2="768" y2="440" stroke="#8b5cf6" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="80" y="548" width="940" height="118" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.1"/>
  <rect x="80" y="548" width="940" height="5" rx="4" fill="#22c55e"/>
  <text x="550" y="578" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">Operational Result</text>
  <text x="140" y="610" fill="#93c5fd" font-size="10">Cluster quorum healthy on management networking</text>
  <text x="140" y="632" fill="#5eead4" font-size="10">DMZ ingress limited to tunnel and reverse proxy paths</text>
  <text x="140" y="654" fill="#67e8f9" font-size="10">Storage isolated with scoped Proxmox and backup reachability</text>
  <text x="572" y="610" fill="#fca5a5" font-size="10">SIEM receives logs through per-zone rules</text>
  <text x="572" y="632" fill="#fcd34d" font-size="10">Game and public services exposed only through approved policies</text>
  <text x="572" y="654" fill="#94a3b8" font-size="10">Exact subnets, host addresses, and rule IDs intentionally omitted</text>
</svg>
