<svg width="1100" height="760" viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a18"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="33%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9333ea" stroke-width="0.15" opacity="0.2"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#9333ea"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1100" height="760" fill="url(#bg)"/>
  <rect width="1100" height="760" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#purpleBar)"/>

  <text x="550" y="32" text-anchor="middle" fill="#e2d9f3" font-size="15" font-weight="700" letter-spacing="2">VLAN SEGMENTATION MIGRATION</text>
  <text x="550" y="50" text-anchor="middle" fill="#4b4266" font-size="10" letter-spacing="1">Flat single subnet to 10 production VLANs · switch hardware swap · 30+ services migrated</text>

  <!-- BEFORE column header -->
  <rect x="40" y="66" width="480" height="34" rx="7" fill="#1a0a0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="280" y="88" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">BEFORE — Flat Network</text>

  <!-- Before box 1 -->
  <rect x="40" y="110" width="480" height="68" rx="8" fill="url(#card)" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="40" y="110" width="480" height="4" rx="3" fill="#ef4444"/>
  <text x="280" y="133" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Legacy Cisco Catalyst 2950 (FastEthernet)</text>
  <text x="280" y="151" text-anchor="middle" fill="#9a7070" font-size="9">100 Mbps half-duplex · no VLAN support · single broadcast domain</text>
  <text x="280" y="168" text-anchor="middle" fill="#6b3030" font-size="8.5">All devices share one flat subnet · no isolation · no firewall between hosts</text>

  <!-- Before box 2 -->
  <rect x="40" y="190" width="480" height="68" rx="8" fill="url(#card)" stroke="#ef4444" stroke-width="1.3"/>
  <text x="280" y="215" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Single Flat Subnet</text>
  <text x="280" y="233" text-anchor="middle" fill="#9a7070" font-size="9">Proxmox nodes · game servers · NAS · IoT · everything on one segment</text>
  <text x="280" y="250" text-anchor="middle" fill="#6b3030" font-size="8.5">Any device can reach any other · no role separation · no firewall enforcement</text>

  <!-- Before box 3 -->
  <rect x="40" y="270" width="480" height="68" rx="8" fill="url(#card)" stroke="#ef4444" stroke-width="1.3"/>
  <text x="280" y="295" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Problems</text>
  <text x="280" y="313" text-anchor="middle" fill="#9a7070" font-size="9">IoT devices reachable from servers · guests on same segment as storage</text>
  <text x="280" y="330" text-anchor="middle" fill="#6b3030" font-size="8.5">No audit trail · no segmentation · no lateral movement controls</text>

  <!-- Arrow -->
  <line x1="536" y1="218" x2="564" y2="218" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="550" y="208" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">MIGRATED</text>

  <!-- AFTER column header -->
  <rect x="580" y="66" width="480" height="34" rx="7" fill="#0a1a0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="820" y="88" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">AFTER — 10-VLAN Production</text>

  <!-- After box 1 -->
  <rect x="580" y="110" width="480" height="68" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="580" y="110" width="480" height="4" rx="3" fill="#22c55e"/>
  <text x="820" y="133" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">Cisco SG300-20 (Core) + Netgear GS728TP (Access)</text>
  <text x="820" y="151" text-anchor="middle" fill="#5ab87a" font-size="9">1 Gbps full-duplex · 802.1Q · STP · LACP · 380W PoE+</text>
  <text x="820" y="168" text-anchor="middle" fill="#2a6040" font-size="8.5">Full VLAN trunking · Proxmox quorum recovered after switch swap</text>

  <!-- After box 2 -->
  <rect x="580" y="190" width="480" height="68" rx="8" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.3"/>
  <text x="820" y="215" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">OPNsense Default-Deny Enforcement</text>
  <text x="820" y="233" text-anchor="middle" fill="#9b85d4" font-size="9">Explicit allow rules for each documented service path · no implicit trust between VLANs</text>
  <text x="820" y="250" text-anchor="middle" fill="#5c4a8a" font-size="8.5">AdGuard DNS per-VLAN · Suricata IDS on WAN · all drops logged</text>

  <!-- After box 3 -->
  <rect x="580" y="270" width="480" height="68" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.3"/>
  <text x="820" y="295" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">10 Role-Based VLANs</text>
  <text x="820" y="313" text-anchor="middle" fill="#5ab87a" font-size="9">Mgmt · Services · DMZ · Storage · SIEM · Game · IoT · Testing · Guest · OOB</text>
  <text x="820" y="330" text-anchor="middle" fill="#2a6040" font-size="8.5">Every segment isolated · 30+ services migrated · all stale IPs updated</text>

  <!-- Migration challenges section -->
  <rect x="40" y="358" width="1020" height="182" rx="12" fill="#0b1220" stroke="#2d1f44" stroke-width="1.2"/>
  <rect x="40" y="358" width="1020" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="384" text-anchor="middle" fill="#e2d9f3" font-size="12" font-weight="700">Key Migration Challenges</text>

  <rect x="60" y="396" width="230" height="124" rx="8" fill="#1a1030" stroke="#ef4444" stroke-width="1.2"/>
  <text x="175" y="418" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">Switch Hardware Swap</text>
  <text x="175" y="436" text-anchor="middle" fill="#9a7070" font-size="8.5">Catalyst 2950 had no VLAN support.</text>
  <text x="175" y="452" text-anchor="middle" fill="#9a7070" font-size="8.5">Replaced with SG300-20. Proxmox</text>
  <text x="175" y="468" text-anchor="middle" fill="#9a7070" font-size="8.5">quorum broke during swap — recovered</text>
  <text x="175" y="484" text-anchor="middle" fill="#9a7070" font-size="8.5">via single surviving node in</text>
  <text x="175" y="500" text-anchor="middle" fill="#9a7070" font-size="8.5">maintenance mode with quorum override.</text>

  <rect x="306" y="396" width="230" height="124" rx="8" fill="#1a1030" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="421" y="418" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">Stale IP References</text>
  <text x="421" y="436" text-anchor="middle" fill="#9a8040" font-size="8.5">Every service had hardcoded IPs</text>
  <text x="421" y="452" text-anchor="middle" fill="#9a8040" font-size="8.5">from the flat network. Updated in</text>
  <text x="421" y="468" text-anchor="middle" fill="#9a8040" font-size="8.5">OPNsense configs, NPMplus proxy</text>
  <text x="421" y="484" text-anchor="middle" fill="#9a8040" font-size="8.5">hosts, app configs, DNS overrides,</text>
  <text x="421" y="500" text-anchor="middle" fill="#9a8040" font-size="8.5">and container network settings.</text>

  <rect x="552" y="396" width="230" height="124" rx="8" fill="#1a1030" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="667" y="418" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">Firewall Rule Ordering</text>
  <text x="667" y="436" text-anchor="middle" fill="#7a60a0" font-size="8.5">OPNsense adds new rules at end.</text>
  <text x="667" y="452" text-anchor="middle" fill="#7a60a0" font-size="8.5">RFC1918 block rule fires before</text>
  <text x="667" y="468" text-anchor="middle" fill="#7a60a0" font-size="8.5">service allow rules. Fixed by reading</text>
  <text x="667" y="484" text-anchor="middle" fill="#7a60a0" font-size="8.5">block rule sequence numbers and</text>
  <text x="667" y="500" text-anchor="middle" fill="#7a60a0" font-size="8.5">inserting pass rules above them.</text>

  <rect x="798" y="396" width="242" height="124" rx="8" fill="#1a1030" stroke="#22c55e" stroke-width="1.2"/>
  <text x="919" y="418" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">30+ Services Migrated</text>
  <text x="919" y="436" text-anchor="middle" fill="#3a7050" font-size="8.5">Authentik, Mailcow, NPMplus,</text>
  <text x="919" y="452" text-anchor="middle" fill="#3a7050" font-size="8.5">Jellyfin, Home Assistant, Wazuh,</text>
  <text x="919" y="468" text-anchor="middle" fill="#3a7050" font-size="8.5">AdGuard, NAS, Proxmox VMs/LXCs,</text>
  <text x="919" y="484" text-anchor="middle" fill="#3a7050" font-size="8.5">game servers — each moved to its</text>
  <text x="919" y="500" text-anchor="middle" fill="#3a7050" font-size="8.5">correct isolated VLAN segment.</text>

  <!-- Results bar -->
  <rect x="40" y="558" width="1020" height="80" rx="12" fill="url(#card)" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="40" y="558" width="1020" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="584" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Migration Results</text>
  <text x="195" y="610" text-anchor="middle" fill="#5ab87a" font-size="10">1 Gbps from 100 Mbps</text>
  <text x="195" y="627" text-anchor="middle" fill="#2a6040" font-size="8.5">full-duplex end-to-end</text>
  <text x="420" y="610" text-anchor="middle" fill="#c4b5fd" font-size="10">Default-deny enforced</text>
  <text x="420" y="627" text-anchor="middle" fill="#5c4a8a" font-size="8.5">all flows documented</text>
  <text x="640" y="610" text-anchor="middle" fill="#fca5a5" font-size="10">10 isolated segments</text>
  <text x="640" y="627" text-anchor="middle" fill="#6b1a1a" font-size="8.5">role-based access</text>
  <text x="875" y="610" text-anchor="middle" fill="#67e8f9" font-size="10">Zero downtime on most services</text>
  <text x="875" y="627" text-anchor="middle" fill="#1a5a6b" font-size="8.5">careful migration ordering</text>

  <!-- Footer -->
  <rect x="40" y="656" width="1020" height="80" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="550" y="676" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700">Migration Timeline (public-safe)</text>
  <text x="160" y="698" text-anchor="middle" fill="#64748b" font-size="8.5">Hardware procurement</text>
  <text x="160" y="712" text-anchor="middle" fill="#475569" font-size="8">Switch selection, PoE planning</text>
  <text x="350" y="698" text-anchor="middle" fill="#64748b" font-size="8.5">Switch swap + quorum recovery</text>
  <text x="350" y="712" text-anchor="middle" fill="#475569" font-size="8">Proxmox maintenance mode</text>
  <text x="550" y="698" text-anchor="middle" fill="#64748b" font-size="8.5">VLAN design + OPNsense rules</text>
  <text x="550" y="712" text-anchor="middle" fill="#475569" font-size="8">10 VLANs, default-deny base</text>
  <text x="760" y="698" text-anchor="middle" fill="#64748b" font-size="8.5">Service migration (30+ services)</text>
  <text x="760" y="712" text-anchor="middle" fill="#475569" font-size="8">IP updates, proxy config, DNS</text>
  <text x="960" y="698" text-anchor="middle" fill="#64748b" font-size="8.5">Validation + monitoring</text>
  <text x="960" y="712" text-anchor="middle" fill="#475569" font-size="8">Wazuh alerts, Uptime Kuma</text>
  <text x="550" y="730" text-anchor="middle" fill="#4b3f66" font-size="7.5" font-style="italic">Exact subnet addresses, host IPs, and rule IDs omitted for public safety</text>
</svg>
