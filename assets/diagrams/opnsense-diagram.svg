<svg width="980" height="600" viewBox="0 0 980 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="980" height="600" fill="url(#bg)"/>
  <rect width="980" height="600" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">OPNsense Edge Firewall</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Dell Optiplex 5040 SFF · 26.1 · VLAN segmentation · default-deny · sanitized for public viewing</text>

  <!-- Internet -->
  <rect x="340" y="72" width="300" height="60" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.8"/>
  <rect x="340" y="72" width="300" height="5" rx="4" fill="#22d3ee"/>
  <text x="490" y="99" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Internet / ISP</text>
  <text x="490" y="118" text-anchor="middle" fill="#64748b" font-size="9.5">WAN uplink · DHCP from ISP</text>

  <line x1="490" y1="132" x2="490" y2="162" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrCyan)"/>

  <!-- OPNsense main -->
  <rect x="80" y="162" width="820" height="96" rx="12" fill="url(#card)" stroke="#8b5cf6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="80" y="162" width="820" height="5" rx="4" fill="#8b5cf6"/>
  <text x="490" y="190" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">OPNsense 26.1 — Edge Firewall / Router</text>
  <text x="490" y="210" text-anchor="middle" fill="#e5e7eb" font-size="10.5">Dell Optiplex 5040 SFF · dual NIC · WAN on em1 · all VLANs trunked on em0</text>
  <text x="490" y="228" text-anchor="middle" fill="#94a3b8" font-size="10">VLAN Segmentation · NAT · Default-deny Firewall · AdGuard DNS · Suricata IDS · ACME TLS</text>
  <text x="490" y="246" text-anchor="middle" fill="#64748b" font-size="9">Encrypted management only · no raw admin ports exposed to internet · Cloudflare Tunnel DMZ ingress</text>

  <!-- Feature bus -->
  <line x1="490" y1="258" x2="490" y2="272" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <line x1="145" y1="272" x2="835" y2="272" stroke="#8b5cf6" stroke-width="1.2" opacity="0.4"/>
  <line x1="145" y1="272" x2="145" y2="286" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" marker-end="url(#arrPurple)"/>
  <line x1="375" y1="272" x2="375" y2="286" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" marker-end="url(#arrPurple)"/>
  <line x1="605" y1="272" x2="605" y2="286" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" marker-end="url(#arrPurple)"/>
  <line x1="835" y1="272" x2="835" y2="286" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" marker-end="url(#arrPurple)"/>

  <!-- Feature chips -->
  <rect x="50" y="286" width="190" height="70" rx="8" fill="#0b1220" stroke="#22d3ee" stroke-width="1.3"/>
  <rect x="50" y="286" width="190" height="4" rx="4" fill="#22d3ee"/>
  <text x="145" y="309" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">AdGuard Home DNS</text>
  <text x="145" y="327" text-anchor="middle" fill="#94a3b8" font-size="9">Network-wide ad blocking</text>
  <text x="145" y="344" text-anchor="middle" fill="#64748b" font-size="8.5">Cloudflare DoT upstream · per-VLAN</text>

  <rect x="280" y="286" width="190" height="70" rx="8" fill="#0b1220" stroke="#ef4444" stroke-width="1.3"/>
  <rect x="280" y="286" width="190" height="4" rx="4" fill="#ef4444"/>
  <text x="375" y="309" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Suricata IDS/IPS</text>
  <text x="375" y="327" text-anchor="middle" fill="#94a3b8" font-size="9">WAN netmap mode</text>
  <text x="375" y="344" text-anchor="middle" fill="#64748b" font-size="8.5">Intrusion detection on WAN</text>

  <rect x="510" y="286" width="190" height="70" rx="8" fill="#0b1220" stroke="#f59e0b" stroke-width="1.3"/>
  <rect x="510" y="286" width="190" height="4" rx="4" fill="#f59e0b"/>
  <text x="605" y="309" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">ACME + Cloudflare</text>
  <text x="605" y="327" text-anchor="middle" fill="#94a3b8" font-size="9">Auto wildcard TLS cert</text>
  <text x="605" y="344" text-anchor="middle" fill="#64748b" font-size="8.5">*.masternazz.com — DNS challenge</text>

  <rect x="740" y="286" width="190" height="70" rx="8" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.3"/>
  <rect x="740" y="286" width="190" height="4" rx="4" fill="#8b5cf6"/>
  <text x="835" y="309" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Firewall + NAT</text>
  <text x="835" y="327" text-anchor="middle" fill="#94a3b8" font-size="9">10-VLAN segmentation</text>
  <text x="835" y="344" text-anchor="middle" fill="#64748b" font-size="8.5">Default-deny between VLANs</text>

  <!-- Down to LAN and DMZ -->
  <line x1="260" y1="356" x2="260" y2="396" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="720" y1="356" x2="720" y2="396" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- LAN zones -->
  <rect x="60" y="396" width="360" height="76" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.8"/>
  <rect x="60" y="396" width="360" height="5" rx="4" fill="#8b5cf6"/>
  <text x="240" y="422" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">Private VLAN Zones (10 VLANs)</text>
  <text x="240" y="441" text-anchor="middle" fill="#94a3b8" font-size="9.5">Management · Services · Storage · SIEM</text>
  <text x="240" y="458" text-anchor="middle" fill="#94a3b8" font-size="9.5">Game · IoT · Testing · Guest · OOB</text>
  <text x="240" y="464" text-anchor="middle" fill="#64748b" font-size="8">All inter-VLAN traffic requires explicit firewall allow rule</text>

  <!-- DMZ zone -->
  <rect x="560" y="396" width="360" height="76" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.8"/>
  <rect x="560" y="396" width="360" height="5" rx="4" fill="#f59e0b"/>
  <text x="740" y="422" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">DMZ — Public Services</text>
  <text x="740" y="441" text-anchor="middle" fill="#94a3b8" font-size="9.5">Cloudflared Tunnel LXC · NPMplus reverse proxy</text>
  <text x="740" y="458" text-anchor="middle" fill="#64748b" font-size="9">Isolated from private LAN · approved backends only</text>

  <line x1="740" y1="472" x2="740" y2="504" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- Cloudflare -->
  <rect x="560" y="504" width="360" height="60" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.3"/>
  <rect x="560" y="504" width="360" height="4" rx="4" fill="#f59e0b"/>
  <text x="740" y="528" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Cloudflare CDN / WAF</text>
  <text x="740" y="547" text-anchor="middle" fill="#94a3b8" font-size="9.5">masternazz.com · DDoS protection · Public HTTPS</text>

  <!-- Security note -->
  <rect x="60" y="504" width="360" height="60" rx="10" fill="#0b1220" stroke="#475569" stroke-width="1"/>
  <text x="240" y="528" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Encrypted management only</text>
  <text x="240" y="546" text-anchor="middle" fill="#64748b" font-size="9">No raw admin ports on internet · deny-by-default policy</text>
  <text x="240" y="557" text-anchor="middle" fill="#475569" font-size="8.5">Management only via Tailscale VPN or local console</text>
</svg>
