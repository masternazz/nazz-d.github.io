<svg width="980" height="580" viewBox="0 0 980 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="40%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrTeal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#14b8a6"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="980" height="580" fill="url(#bg)"/>
  <rect width="980" height="580" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Zero-Trust Remote Access</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">masternazz.com homelab · dual-path: admin via encrypted tunnel · public via Cloudflare</text>

  <!-- Divider drawn BEFORE any cards so all cards appear on top of it -->
  <line x1="490" y1="68" x2="490" y2="500" stroke="#475569" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <text x="245" y="76" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="700" letter-spacing="1">ADMIN / PRIVATE ACCESS</text>
  <text x="735" y="76" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700" letter-spacing="1">PUBLIC SERVICE ACCESS</text>

  <!-- LEFT: Admin Device -->
  <rect x="55" y="88" width="310" height="62" rx="10" fill="url(#card)" stroke="#14b8a6" stroke-width="1.8" filter="url(#glow)"/>
  <rect x="55" y="88" width="310" height="5" rx="4" fill="#14b8a6"/>
  <text x="210" y="116" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">Admin Device</text>
  <text x="210" y="136" text-anchor="middle" fill="#94a3b8" font-size="9.5">Tailscale client · WireGuard tunnel</text>

  <line x1="210" y1="150" x2="210" y2="176" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrTeal)"/>

  <!-- LEFT: Headscale -->
  <rect x="55" y="178" width="310" height="72" rx="10" fill="url(#card)" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="55" y="178" width="310" height="5" rx="4" fill="#14b8a6"/>
  <text x="210" y="202" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">Headscale Control Plane</text>
  <text x="210" y="220" text-anchor="middle" fill="#94a3b8" font-size="9.5">Self-hosted · peer key management</text>
  <text x="210" y="237" text-anchor="middle" fill="#64748b" font-size="8.5">DERP relay · NAT traversal · no central authority</text>

  <line x1="210" y1="250" x2="210" y2="276" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrTeal)"/>

  <!-- LEFT: Tailscale Exit Node -->
  <rect x="55" y="278" width="310" height="60" rx="10" fill="url(#card)" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="55" y="278" width="310" height="5" rx="4" fill="#14b8a6"/>
  <text x="210" y="301" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">Tailscale Exit Node</text>
  <text x="210" y="319" text-anchor="middle" fill="#94a3b8" font-size="9.5">Subnet routing · split-tunnel capable</text>

  <line x1="210" y1="338" x2="210" y2="364" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrTeal)"/>

  <!-- LEFT: Internal Services -->
  <rect x="55" y="366" width="310" height="68" rx="10" fill="url(#card)" stroke="#14b8a6" stroke-width="1.8"/>
  <rect x="55" y="366" width="310" height="5" rx="4" fill="#14b8a6"/>
  <text x="210" y="392" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">Internal Services</text>
  <text x="210" y="410" text-anchor="middle" fill="#94a3b8" font-size="9.5">Proxmox · OPNsense · NAS</text>
  <text x="210" y="426" text-anchor="middle" fill="#64748b" font-size="8.5">All VMs · full private network access</text>

  <!-- LEFT: Bottom note -->
  <rect x="55" y="450" width="310" height="40" rx="7" fill="#0b1220" stroke="#14b8a6" stroke-width="1"/>
  <text x="210" y="468" text-anchor="middle" fill="#5eead4" font-size="9.5" font-weight="600">Encrypted WireGuard mesh</text>
  <text x="210" y="484" text-anchor="middle" fill="#64748b" font-size="8.5">No admin ports exposed to WAN</text>

  <!-- RIGHT: Public Internet -->
  <rect x="615" y="88" width="310" height="62" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.8"/>
  <rect x="615" y="88" width="310" height="5" rx="4" fill="#f59e0b"/>
  <text x="770" y="116" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Public Internet</text>
  <text x="770" y="136" text-anchor="middle" fill="#94a3b8" font-size="9.5">End users · any device · anywhere</text>

  <line x1="770" y1="150" x2="770" y2="176" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- RIGHT: Cloudflare CDN -->
  <rect x="615" y="178" width="310" height="72" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="615" y="178" width="310" height="5" rx="4" fill="#f59e0b"/>
  <text x="770" y="202" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Cloudflare CDN + WAF</text>
  <text x="770" y="220" text-anchor="middle" fill="#94a3b8" font-size="9.5">DDoS protection · proxy mode</text>
  <text x="770" y="237" text-anchor="middle" fill="#64748b" font-size="8.5">Origin IP hidden · rate limiting · HTTP/3</text>

  <line x1="770" y1="250" x2="770" y2="276" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- RIGHT: Cloudflare Tunnel -->
  <rect x="615" y="278" width="310" height="60" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="615" y="278" width="310" height="5" rx="4" fill="#f59e0b"/>
  <text x="770" y="301" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">Cloudflare Tunnel</text>
  <text x="770" y="319" text-anchor="middle" fill="#94a3b8" font-size="9.5">DMZ LXC · isolated from private LAN</text>

  <line x1="770" y1="338" x2="770" y2="364" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrAmber)"/>

  <!-- RIGHT: NPMplus Reverse Proxy -->
  <rect x="615" y="366" width="310" height="68" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.8"/>
  <rect x="615" y="366" width="310" height="5" rx="4" fill="#f59e0b"/>
  <text x="770" y="392" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">NPMplus Reverse Proxy</text>
  <text x="770" y="410" text-anchor="middle" fill="#94a3b8" font-size="9.5">TLS termination · subdomain routing</text>
  <text x="770" y="426" text-anchor="middle" fill="#64748b" font-size="8.5">Media · Homepage · Game Servers · etc.</text>

  <!-- RIGHT: Bottom note -->
  <rect x="615" y="450" width="310" height="40" rx="7" fill="#0b1220" stroke="#f59e0b" stroke-width="1"/>
  <text x="770" y="468" text-anchor="middle" fill="#fcd34d" font-size="9.5" font-weight="600">No management WAN forwards</text>
  <text x="770" y="484" text-anchor="middle" fill="#64748b" font-size="8.5">Tunneled web ingress · LAN isolated</text>

  <!-- Bottom banner -->
  <rect x="55" y="510" width="870" height="44" rx="10" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.3"/>
  <rect x="55" y="510" width="870" height="4" rx="4" fill="url(#bar)"/>
  <text x="490" y="530" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">*.masternazz.com — Wildcard TLS via ACME + Cloudflare DNS-01 Challenge</text>
  <text x="490" y="547" text-anchor="middle" fill="#64748b" font-size="8.5">Auto-renewed · OPNsense ACME plugin · certificate pushed to all internal services</text>
</svg>
