<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.28"/>
    </pattern>
    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowAmber" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Self-Hosted MCP Control Plane</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Public-safe view: no exposed listener, no credentials, no internal host targets</text>

  <rect x="38" y="92" width="210" height="118" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="38" y="92" width="210" height="5" rx="4" fill="#22d3ee"/>
  <text x="143" y="120" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">AI Clients</text>
  <text x="143" y="145" text-anchor="middle" fill="#cbd5e1" font-size="10">Claude Code</text>
  <text x="143" y="162" text-anchor="middle" fill="#cbd5e1" font-size="10">Gemini CLI</text>
  <text x="143" y="179" text-anchor="middle" fill="#cbd5e1" font-size="10">VS Code / Cursor</text>
  <text x="143" y="197" text-anchor="middle" fill="#64748b" font-size="9">Tool calls stay structured</text>

  <rect x="310" y="92" width="360" height="118" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="310" y="92" width="360" height="5" rx="4" fill="#8b5cf6"/>
  <text x="490" y="120" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">MCP Server LXC</text>
  <text x="490" y="143" text-anchor="middle" fill="#e5e7eb" font-size="11">Node.js runtime with 55 validated tools</text>
  <text x="490" y="161" text-anchor="middle" fill="#94a3b8" font-size="10">stdio transport over SSH key auth</text>
  <text x="490" y="179" text-anchor="middle" fill="#94a3b8" font-size="10">zod schemas validate every input before execution</text>
  <text x="490" y="197" text-anchor="middle" fill="#64748b" font-size="9">Secrets loaded locally from environment files</text>

  <line x1="248" y1="151" x2="306" y2="151" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="277" y="139" text-anchor="middle" fill="#67e8f9" font-size="9">SSH + stdio</text>

  <rect x="734" y="92" width="208" height="118" rx="10" fill="url(#card)" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="734" y="92" width="208" height="5" rx="4" fill="#f59e0b"/>
  <text x="838" y="120" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Safety Boundary</text>
  <text x="838" y="145" text-anchor="middle" fill="#cbd5e1" font-size="10">No public HTTP API</text>
  <text x="838" y="162" text-anchor="middle" fill="#cbd5e1" font-size="10">No credentials in prompts</text>
  <text x="838" y="179" text-anchor="middle" fill="#cbd5e1" font-size="10">Approved actions only</text>
  <text x="838" y="197" text-anchor="middle" fill="#64748b" font-size="9">Audit through client output</text>

  <line x1="670" y1="151" x2="730" y2="151" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="700" y="139" text-anchor="middle" fill="#fcd34d" font-size="9">guardrails</text>

  <rect x="82" y="285" width="816" height="170" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.2"/>
  <rect x="82" y="285" width="816" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="313" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="700">Private Service Integrations</text>
  <text x="490" y="333" text-anchor="middle" fill="#94a3b8" font-size="10">Handlers call local APIs or SSH targets inside the lab; exact addresses stay private</text>

  <line x1="490" y1="210" x2="490" y2="282" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="525" y="250" fill="#c4b5fd" font-size="9">validated handler call</text>

  <g fill="#111827" stroke-width="1.2">
    <rect x="118" y="357" width="128" height="54" rx="8" stroke="#22d3ee"/>
    <rect x="262" y="357" width="128" height="54" rx="8" stroke="#8b5cf6"/>
    <rect x="406" y="357" width="128" height="54" rx="8" stroke="#f59e0b"/>
    <rect x="550" y="357" width="128" height="54" rx="8" stroke="#14b8a6"/>
    <rect x="694" y="357" width="128" height="54" rx="8" stroke="#ef4444"/>
  </g>
  <text x="182" y="381" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">OPNsense</text>
  <text x="182" y="398" text-anchor="middle" fill="#94a3b8" font-size="9">firewall, DNS, DHCP</text>
  <text x="326" y="381" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Proxmox</text>
  <text x="326" y="398" text-anchor="middle" fill="#94a3b8" font-size="9">LXC, nodes, backups</text>
  <text x="470" y="381" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">AdGuard</text>
  <text x="470" y="398" text-anchor="middle" fill="#94a3b8" font-size="9">rewrites, logs, status</text>
  <text x="614" y="381" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">NPMplus</text>
  <text x="614" y="398" text-anchor="middle" fill="#94a3b8" font-size="9">proxy hosts, certs</text>
  <text x="758" y="381" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Wazuh</text>
  <text x="758" y="398" text-anchor="middle" fill="#94a3b8" font-size="9">alerts and agent data</text>

  <rect x="226" y="472" width="528" height="44" rx="8" fill="#101827" stroke="#475569" stroke-width="1"/>
  <text x="490" y="490" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="700">Example Result Path</text>
  <text x="490" y="506" text-anchor="middle" fill="#94a3b8" font-size="9">Tool result returns as structured MCP content so the assistant can keep working in context</text>
</svg>
