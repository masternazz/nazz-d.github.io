  <text x="124" y="393" text-anchor="middle" fill="#64748b" font-size="8.5">Live stream · final edit on close</text>
  <text x="124" y="404" text-anchor="middle" fill="#64748b" font-size="8">Chunked for long output</text>

  <line x1="268" y1="270" x2="210" y2="290" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
