  <text x="840" y="100" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700">AI Engines</text>

  <rect x="756" y="112" width="168" height="52" rx="7" fill="url(#agcardd)" stroke="#22d3ee" stroke-width="1.4"/>
