  <line x1="464" y1="211" x2="482" y2="211" stroke="#f59e0b" stroke-width="1.4" marker-end="url(#agdArrAmber)"/>

  <!-- reply.js -->
  <rect x="284" y="253" width="386" height="30" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="477" y="272" text-anchor="middle" fill="#94a3b8" font-size="9">reply.js — Telegram editMessageText (streaming) · SMTP sendMail (email)</text>

  <line x1="688" y1="182" x2="740" y2="182" stroke="#8b5cf6" stroke-width="2" marker-end="url(#agdArrPurple)"/>
  <text x="714" y="174" text-anchor="middle" fill="#c4b5fd" font-size="8.5">spawn</text>

