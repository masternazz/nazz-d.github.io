  <text x="478" y="117" text-anchor="middle" fill="#64748b" font-size="9">Proxmox LXC · Cloudflare Tunnel · systemd service</text>

  <!-- parser.js -->
  <rect x="284" y="127" width="180" height="48" rx="7" fill="#1e1040" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="374" y="147" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700">parser.js</text>
  <text x="374" y="163" text-anchor="middle" fill="#94a3b8" font-size="8.5">engine prefix · verbose flag</text>
  <text x="374" y="171" text-anchor="middle" fill="#64748b" font-size="8">git ops validated vs REPOS env</text>

  <!-- memory.js -->
  <rect x="284" y="187" width="180" height="48" rx="7" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
  <text x="374" y="207" text-anchor="middle" fill="#86efac" font-size="10" font-weight="700">memory.js</text>
  <text x="374" y="223" text-anchor="middle" fill="#94a3b8" font-size="8.5">prepend memory.md + history</text>
  <text x="374" y="231" text-anchor="middle" fill="#64748b" font-size="8">auto-compact at 20 entries</text>

  <!-- runner.js -->
  <rect x="482" y="127" width="188" height="48" rx="7" fill="#0c1a3a" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="576" y="147" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="700">runner.js</text>
  <text x="576" y="163" text-anchor="middle" fill="#94a3b8" font-size="8.5">spawn · stdin/arg · 5-min timeout</text>
  <text x="576" y="171" text-anchor="middle" fill="#64748b" font-size="8">runStreaming() → onChunk every 1.5 s</text>

  <!-- git.js -->
  <rect x="482" y="187" width="188" height="48" rx="7" fill="#1c1008" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="576" y="207" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="700">git.js</text>
  <text x="576" y="223" text-anchor="middle" fill="#94a3b8" font-size="8.5">simple-git · GIT_SSH_COMMAND</text>
  <text x="576" y="231" text-anchor="middle" fill="#64748b" font-size="8">clone lock · auto-log after pull</text>

