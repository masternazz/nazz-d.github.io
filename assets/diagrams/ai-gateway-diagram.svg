  <text x="359" y="440" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">Shared Memory</text>
  <text x="359" y="456" text-anchor="middle" fill="#94a3b8" font-size="9">memory.md — all AIs read on every prompt</text>
  <text x="359" y="470" text-anchor="middle" fill="#94a3b8" font-size="9">history/channel.json per Telegram chat</text>
  <text x="359" y="482" text-anchor="middle" fill="#64748b" font-size="8">memory: fact saves inline</text>

  <rect x="464" y="420" width="224" height="68" rx="9" fill="#1c1008" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="464" y="420" width="224" height="4" rx="4" fill="#f59e0b"/>
  <text x="576" y="440" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Git Integration</text>
  <text x="576" y="456" text-anchor="middle" fill="#94a3b8" font-size="9">pull · push · commit · diff · log</text>
  <text x="576" y="470" text-anchor="middle" fill="#94a3b8" font-size="9">SSH key auth via GIT_SSH_COMMAND</text>
  <text x="576" y="482" text-anchor="middle" fill="#64748b" font-size="8">Clone lock · auto-log injected as AI context</text>

  <rect x="702" y="420" width="238" height="68" rx="9" fill="#1a0c00" stroke="#ea580c" stroke-width="1.4"/>
  <rect x="702" y="420" width="238" height="4" rx="4" fill="#ea580c"/>
  <text x="821" y="440" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">Non-Obvious Fixes</text>
  <text x="821" y="456" text-anchor="middle" fill="#94a3b8" font-size="9">allowUnsafeSshCommand in simple-git</text>
  <text x="821" y="470" text-anchor="middle" fill="#94a3b8" font-size="9">Gemini: --yolo + -p arg (not stdin)</text>
  <text x="821" y="482" text-anchor="middle" fill="#64748b" font-size="8">Clone lock prevents concurrent ensureCloned race</text>

  <!-- ── USAGE EXAMPLES BAR ── -->
  <rect x="38" y="508" width="904" height="82" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1.2"/>
  <rect x="38" y="508" width="904" height="5" rx="4" fill="url(#agbard)"/>
  <text x="490" y="531" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Message Format Examples</text>
  <text x="175" y="553" text-anchor="middle" fill="#67e8f9" font-size="9">No prefix → Claude (default)</text>
  <text x="175" y="568" text-anchor="middle" fill="#94a3b8" font-size="8.5">what's the fastest way to sort a list in Python?</text>
  <text x="175" y="581" text-anchor="middle" fill="#64748b" font-size="8">gemini: or codex: to switch engines</text>
  <text x="490" y="553" text-anchor="middle" fill="#c4b5fd" font-size="9">git ops inline</text>
  <text x="490" y="568" text-anchor="middle" fill="#94a3b8" font-size="8.5">gemini: pull homelab-docs and summarize changes</text>
  <text x="490" y="581" text-anchor="middle" fill="#64748b" font-size="8">git runs first · log auto-injected as context</text>
  <text x="805" y="553" text-anchor="middle" fill="#fcd34d" font-size="9">verbose + memory</text>
  <text x="805" y="568" text-anchor="middle" fill="#94a3b8" font-size="8.5">verbose: pull my-docs and diff it</text>
  <text x="805" y="581" text-anchor="middle" fill="#64748b" font-size="8">memory: always prefer YAML over JSON</text>
