  <rect width="980" height="620" fill="url(#agbgd)"/>
  <rect width="980" height="620" fill="url(#agdgrid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#agbard)"/>

  <!-- Title -->
  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Self-Hosted AI Gateway</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Telegram and email routed to Claude, Gemini CLI, or Codex — with git ops, streaming, and shared memory</text>

  <!-- ── INPUT LAYER ── -->
  <rect x="38" y="72" width="172" height="96" rx="10" fill="url(#agcardd)" stroke="#22d3ee" stroke-width="1.8"/>
  <rect x="38" y="72" width="172" height="5" rx="4" fill="#22d3ee"/>
  <text x="124" y="99" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Telegram</text>
  <text x="124" y="117" text-anchor="middle" fill="#cbd5e1" font-size="9.5">Webhook via Cloudflare Tunnel</text>
  <text x="124" y="133" text-anchor="middle" fill="#cbd5e1" font-size="9.5">Secret token in URL path</text>
  <text x="124" y="160" text-anchor="middle" fill="#64748b" font-size="8.5">Single allowed user ID</text>

  <rect x="38" y="184" width="172" height="82" rx="10" fill="url(#agcardd)" stroke="#14b8a6" stroke-width="1.8"/>
  <rect x="38" y="184" width="172" height="5" rx="4" fill="#14b8a6"/>
  <text x="124" y="211" text-anchor="middle" fill="#5eead4" font-size="12" font-weight="700">Email (IMAP)</text>
  <text x="124" y="229" text-anchor="middle" fill="#cbd5e1" font-size="9.5">Polled via imapflow</text>
  <text x="124" y="247" text-anchor="middle" fill="#cbd5e1" font-size="9.5">SSL / STARTTLS</text>
  <text x="124" y="259" text-anchor="middle" fill="#64748b" font-size="8.5">Domain allowlist enforced</text>

  <line x1="210" y1="120" x2="268" y2="162" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#agdArrCyan)"/>
  <line x1="210" y1="225" x2="268" y2="200" stroke="#14b8a6" stroke-width="1.8" marker-end="url(#agdArrTeal)"/>

