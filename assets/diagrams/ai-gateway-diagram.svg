  <text x="840" y="209" text-anchor="middle" fill="#94a3b8" font-size="8.5">--yolo · prompt as -p arg (not stdin)</text>
  <text x="840" y="220" text-anchor="middle" fill="#64748b" font-size="8">Prefix: gemini: · bypasses agentic hang</text>

  <rect x="756" y="236" width="168" height="48" rx="7" fill="url(#agcardd)" stroke="#f59e0b" stroke-width="1.4"/>
  <rect x="756" y="236" width="168" height="4" rx="4" fill="#f59e0b"/>
  <text x="840" y="255" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">OpenAI Codex</text>
