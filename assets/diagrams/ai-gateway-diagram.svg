  <text x="124" y="445" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">Email Reply</text>
  <text x="124" y="461" text-anchor="middle" fill="#cbd5e1" font-size="9">SMTP via nodemailer</text>
  <text x="124" y="474" text-anchor="middle" fill="#64748b" font-size="8.5">Full output sent on close</text>

  <!-- ── BOTTOM FEATURE ROW ── -->
  <line x1="374" y1="291" x2="374" y2="420" stroke="#22c55e" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#agdArrGreen)"/>
  <line x1="576" y1="291" x2="576" y2="420" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#agdArrAmber)"/>

  <rect x="268" y="420" width="182" height="68" rx="9" fill="#052e16" stroke="#22c55e" stroke-width="1.4"/>
