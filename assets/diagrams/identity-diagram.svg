<svg width="980" height="540" viewBox="0 0 980 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrIndigo" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="980" height="540" fill="url(#bg)"/>
  <rect width="980" height="540" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Centralized Identity — Authentik</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">SSO · OIDC / OAuth2 · LDAP Outpost · MFA · Centralized Access Policy</text>

  <!-- Authentik center -->
  <rect x="315" y="72" width="350" height="90" rx="12" fill="url(#card)" stroke="#8b5cf6" stroke-width="2.5" filter="url(#glow)"/>
  <rect x="315" y="72" width="350" height="5" rx="4" fill="#8b5cf6"/>
  <text x="490" y="102" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">Authentik</text>
  <text x="490" y="122" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="600">Self-Hosted Identity Provider</text>
  <text x="490" y="140" text-anchor="middle" fill="#94a3b8" font-size="9.5">SSO · OIDC / OAuth2 · LDAP Outpost · MFA · Access Policy · User Groups</text>
  <text x="490" y="155" text-anchor="middle" fill="#64748b" font-size="8.5">Proxmox LXC · Docker Compose · PostgreSQL backend</text>

  <!-- Left branch label -->
  <text x="155" y="202" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="700" letter-spacing="1">OIDC / OAuth2</text>

  <!-- OIDC paths from left side of Authentik -->
  <path d="M315,92 L72,92 L72,220" fill="none" stroke="#8b5cf6" stroke-width="1.4" stroke-linejoin="round" opacity="0.65" marker-end="url(#arrPurple)"/>
  <path d="M315,108 L90,108 L90,290" fill="none" stroke="#8b5cf6" stroke-width="1.4" stroke-linejoin="round" opacity="0.5" marker-end="url(#arrPurple)"/>
  <path d="M315,124 L240,124 L240,220" fill="none" stroke="#8b5cf6" stroke-width="1.4" stroke-linejoin="round" opacity="0.5" marker-end="url(#arrPurple)"/>
  <path d="M315,140 L256,140 L256,290" fill="none" stroke="#8b5cf6" stroke-width="1.4" stroke-linejoin="round" opacity="0.4" marker-end="url(#arrPurple)"/>

  <!-- OIDC chips row 1 -->
  <rect x="30" y="220" width="130" height="50" rx="7" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="30" y="220" width="130" height="4" rx="4" fill="#8b5cf6"/>
  <text x="95" y="241" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Jellyfin</text>
  <text x="95" y="258" text-anchor="middle" fill="#64748b" font-size="8.5">Media SSO login</text>

  <rect x="175" y="220" width="130" height="50" rx="7" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="175" y="220" width="130" height="4" rx="4" fill="#8b5cf6"/>
  <text x="240" y="241" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">NPMplus</text>
  <text x="240" y="258" text-anchor="middle" fill="#64748b" font-size="8.5">Proxy auth portal</text>

  <!-- OIDC chips row 2 -->
  <rect x="30" y="290" width="130" height="50" rx="7" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="30" y="290" width="130" height="4" rx="4" fill="#8b5cf6"/>
  <text x="95" y="311" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Homepage</text>
  <text x="95" y="328" text-anchor="middle" fill="#64748b" font-size="8.5">Dashboard SSO</text>

  <rect x="175" y="290" width="130" height="50" rx="7" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="175" y="290" width="130" height="4" rx="4" fill="#8b5cf6"/>
  <text x="240" y="311" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Proxmox</text>
  <text x="240" y="328" text-anchor="middle" fill="#64748b" font-size="8.5">Hypervisor SSO</text>

  <!-- Right branch label -->
  <text x="820" y="202" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="700" letter-spacing="1">LDAP OUTPOST</text>

  <!-- LDAP paths from right side of Authentik -->
  <path d="M665,108 L726,108 L726,220" fill="none" stroke="#6366f1" stroke-width="1.4" stroke-linejoin="round" opacity="0.65" marker-end="url(#arrIndigo)"/>
  <path d="M665,124 L880,124 L880,220" fill="none" stroke="#6366f1" stroke-width="1.4" stroke-linejoin="round" opacity="0.65" marker-end="url(#arrIndigo)"/>

  <!-- LDAP chips -->
  <rect x="668" y="220" width="130" height="50" rx="7" fill="#0b1220" stroke="#6366f1" stroke-width="1.2"/>
  <rect x="668" y="220" width="130" height="4" rx="4" fill="#6366f1"/>
  <text x="733" y="241" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Wazuh SIEM</text>
  <text x="733" y="258" text-anchor="middle" fill="#64748b" font-size="8.5">Directory auth</text>

  <rect x="815" y="220" width="130" height="50" rx="7" fill="#0b1220" stroke="#6366f1" stroke-width="1.2"/>
  <rect x="815" y="220" width="130" height="4" rx="4" fill="#6366f1"/>
  <text x="880" y="241" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Legacy Apps</text>
  <text x="880" y="258" text-anchor="middle" fill="#64748b" font-size="8.5">LDAP bind</text>

  <!-- LDAP chips → outpost -->
  <line x1="733" y1="270" x2="733" y2="298" stroke="#6366f1" stroke-width="1.3" opacity="0.6" marker-end="url(#arrIndigo)"/>
  <line x1="880" y1="270" x2="880" y2="298" stroke="#6366f1" stroke-width="1.3" opacity="0.6" marker-end="url(#arrIndigo)"/>

  <rect x="668" y="298" width="277" height="68" rx="8" fill="url(#card)" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="668" y="298" width="277" height="4" rx="4" fill="#6366f1"/>
  <text x="806" y="320" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">LDAP Outpost</text>
  <text x="806" y="338" text-anchor="middle" fill="#94a3b8" font-size="9.5">Exposes user directory to LDAP-only apps</text>
  <text x="806" y="355" text-anchor="middle" fill="#64748b" font-size="8.5">No separate LDAP server required</text>

  <!-- User flow bar -->
  <rect x="30" y="396" width="920" height="72" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.2"/>
  <rect x="30" y="396" width="920" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="420" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">User Login Flow</text>

  <rect x="50" y="432" width="120" height="26" rx="5" fill="#0b1220" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="450" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Single credential</text>

  <text x="195" y="449" text-anchor="middle" fill="#6d28d9" font-size="16">→</text>

  <rect x="210" y="432" width="120" height="26" rx="5" fill="#0b1220" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="270" y="450" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Authentik + MFA</text>

  <text x="355" y="449" text-anchor="middle" fill="#6d28d9" font-size="16">→</text>

  <rect x="370" y="432" width="140" height="26" rx="5" fill="#0b1220" stroke="#8b5cf6" stroke-width="1"/>
  <text x="440" y="450" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Token issued to app</text>

  <text x="650" y="443" text-anchor="middle" fill="#94a3b8" font-size="10">One login · centralized policy</text>
  <text x="650" y="458" text-anchor="middle" fill="#64748b" font-size="9">Revoke access across all services instantly</text>
  <text x="875" y="443" text-anchor="middle" fill="#94a3b8" font-size="10">OPNsense SSO login</text>
  <text x="875" y="458" text-anchor="middle" fill="#64748b" font-size="9">OIDC plugin (patched)</text>

  <text x="490" y="498" text-anchor="middle" fill="#475569" font-size="8.5">Client IDs, bind credentials, and redirect URIs are kept private — architecture shown only</text>
</svg>
