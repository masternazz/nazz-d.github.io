<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Guest captive portal architecture</title>
  <desc id="desc">Public safe diagram showing a guest device joining a guest SSID, receiving DHCP and DNS from OPNsense, authenticating through a captive portal, and being allowed to reach only the internet.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.55" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1e293b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowBlock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <style>
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .muted{fill:#475569}
      .tiny{font-size:18px}
      .small{font-size:22px}
      .mid{font-size:30px;font-weight:800}
      .title{font-size:42px;font-weight:900}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:22;filter:url(#shadow)}
      .box2{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:22;filter:url(#shadow)}
      .box3{fill:#fff1f2;stroke:#fb7185;stroke-width:2;rx:22;filter:url(#shadow)}
      .chip{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1;rx:16}
      .allow{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .deny{stroke:#dc2626;stroke-width:4;fill:none;stroke-dasharray:10 10;marker-end:url(#arrowBlock)}
      .thin{stroke:#0891b2;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="60" y="70" class="label title">Guest Captive Portal</text>
  <text x="60" y="105" class="label small muted">VLAN 8 guest access with portal enforcement, DHCP/DNS control, and internal-network blocking.</text>

  <rect x="60" y="165" width="210" height="145" class="box"/>
  <text x="90" y="215" class="label mid">Guest Device</text>
  <text x="90" y="252" class="label small muted">fresh phone/laptop</text>
  <text x="90" y="282" class="label tiny muted">receives guest lease</text>

  <rect x="365" y="155" width="220" height="165" class="box2"/>
  <text x="395" y="205" class="label mid">Guest SSID</text>
  <text x="395" y="242" class="label small muted">tagged to VLAN 8</text>
  <text x="395" y="272" class="label tiny muted">AP trunk carries guest traffic</text>

  <rect x="690" y="140" width="250" height="190" class="box2"/>
  <text x="720" y="190" class="label mid">OPNsense</text>
  <text x="720" y="227" class="label small muted">Guest_Portal zone</text>
  <text x="720" y="257" class="label tiny muted">bound to opt8 / Guest</text>
  <text x="720" y="287" class="label tiny muted">DHCP lease: 8 hours</text>

  <rect x="660" y="430" width="290" height="145" class="box"/>
  <text x="690" y="480" class="label mid">Captive Portal</text>
  <text x="690" y="517" class="label small muted">click-to-connect flow</text>
  <text x="690" y="547" class="label tiny muted">idle 30 min / hard 8 hr</text>

  <rect x="1010" y="160" width="140" height="135" class="box"/>
  <text x="1043" y="210" class="label mid">Internet</text>
  <text x="1035" y="247" class="label tiny muted">allowed after</text>
  <text x="1035" y="273" class="label tiny muted">portal session</text>

  <rect x="1000" y="450" width="150" height="135" class="box3"/>
  <text x="1032" y="500" class="label mid">Internal</text>
  <text x="1030" y="537" class="label tiny muted">management</text>
  <text x="1030" y="563" class="label tiny muted">storage/apps</text>

  <path d="M270 238 H365" class="thin"/>
  <path d="M585 238 H690" class="thin"/>
  <path d="M815 330 V430" class="allow"/>
  <path d="M940 235 H1010" class="allow"/>
  <path d="M950 505 H1000" class="deny"/>

  <rect x="70" y="390" width="470" height="200" class="box"/>
  <text x="100" y="440" class="label mid">Validation Checklist</text>
  <rect x="100" y="470" width="150" height="38" class="chip"/>
  <text x="120" y="496" class="label tiny">Guest lease</text>
  <rect x="265" y="470" width="190" height="38" class="chip"/>
  <text x="285" y="496" class="label tiny">Portal session</text>
  <rect x="100" y="525" width="170" height="38" class="chip"/>
  <text x="120" y="551" class="label tiny">Internet works</text>
  <rect x="285" y="525" width="210" height="38" class="chip"/>
  <text x="305" y="551" class="label tiny">Internal blocked</text>

  <text x="60" y="665" class="label tiny muted">Public-safe architecture diagram: private addressing and sensitive host details omitted.</text>
</svg>
