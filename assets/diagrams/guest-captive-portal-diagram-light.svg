<svg data-diagram-theme="light" width="1100" height="680" viewBox="0 0 1100 680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf5ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="40%" stop-color="#0891b2"/>
      <stop offset="70%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#2563eb" stroke-width="0.35" opacity="0.18"/>
    </pattern>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#7c3aed" opacity="0.9"/>
    </marker>
    <marker id="arrCyan" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#0891b2" opacity="0.9"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#16a34a" opacity="0.9"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#dc2626" opacity="0.9"/>
    </marker>
  </defs>

  <rect width="1100" height="680" fill="url(#bg)"/>
  <rect width="1100" height="680" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#purpleBar)"/>

  <text x="550" y="34" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700" letter-spacing="2">GUEST CAPTIVE PORTAL — VLAN 8</text>
  <text x="550" y="52" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="1">OPNsense portal enforcement · internet-only guest access · internal-network blocking</text>

  <!-- Guest Device -->
  <rect x="40" y="76" width="200" height="100" rx="9" fill="url(#card)" stroke="#7c3aed" stroke-width="1.6"/>
  <rect x="40" y="76" width="200" height="4" rx="3" fill="#7c3aed"/>
  <text x="140" y="103" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">Guest Device</text>
  <text x="140" y="121" text-anchor="middle" fill="#64748b" font-size="9.5">Phone or laptop</text>
  <text x="140" y="138" text-anchor="middle" fill="#64748b" font-size="9">Joins guest SSID</text>
  <text x="140" y="165" text-anchor="middle" fill="#7c3aed" font-size="8" font-style="italic">receives guest DHCP lease</text>

  <line x1="240" y1="126" x2="290" y2="126" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrPurple)"/>

  <!-- Guest SSID -->
  <rect x="290" y="76" width="200" height="100" rx="9" fill="url(#card)" stroke="#0891b2" stroke-width="1.6"/>
  <rect x="290" y="76" width="200" height="4" rx="3" fill="#0891b2"/>
  <text x="390" y="103" text-anchor="middle" fill="#0e7490" font-size="12" font-weight="700">Guest SSID</text>
  <text x="390" y="121" text-anchor="middle" fill="#64748b" font-size="9.5">Tagged VLAN 8</text>
  <text x="390" y="138" text-anchor="middle" fill="#64748b" font-size="9">AP trunk carries guest traffic</text>
  <text x="390" y="165" text-anchor="middle" fill="#0891b2" font-size="8" font-style="italic">802.1Q tag applied at AP</text>

  <line x1="490" y1="126" x2="540" y2="126" stroke="#0891b2" stroke-width="1.8" marker-end="url(#arrCyan)"/>

  <!-- OPNsense -->
  <rect x="540" y="66" width="240" height="120" rx="9" fill="url(#card)" stroke="#7c3aed" stroke-width="2.2"/>
  <rect x="540" y="66" width="240" height="5" rx="3" fill="url(#purpleBar)"/>
  <text x="660" y="96" text-anchor="middle" fill="#3b0764" font-size="13" font-weight="700">OPNsense</text>
  <text x="660" y="114" text-anchor="middle" fill="#64748b" font-size="10">Guest_Portal zone · opt8 / Guest</text>
  <text x="660" y="131" text-anchor="middle" fill="#64748b" font-size="9">DHCP lease: 8 hours</text>
  <text x="660" y="148" text-anchor="middle" fill="#64748b" font-size="9">Portal idle: 30 min · hard: 8 hr</text>
  <text x="660" y="175" text-anchor="middle" fill="#7c3aed" font-size="8" font-style="italic">portal zone bound to Guest interface</text>

  <line x1="780" y1="116" x2="830" y2="116" stroke="#16a34a" stroke-width="1.8" marker-end="url(#arrGreen)"/>

  <!-- Internet -->
  <rect x="830" y="76" width="230" height="100" rx="9" fill="url(#card)" stroke="#16a34a" stroke-width="1.6"/>
  <rect x="830" y="76" width="230" height="4" rx="3" fill="#16a34a"/>
  <text x="945" y="103" text-anchor="middle" fill="#14532d" font-size="12" font-weight="700">Internet</text>
  <text x="945" y="121" text-anchor="middle" fill="#64748b" font-size="9.5">Allowed after portal auth</text>
  <text x="945" y="138" text-anchor="middle" fill="#64748b" font-size="9">Full WAN access</text>
  <text x="945" y="165" text-anchor="middle" fill="#16a34a" font-size="8" font-style="italic">ALLOWED</text>

  <!-- OPNsense down to portal -->
  <line x1="660" y1="186" x2="660" y2="236" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrPurple)"/>

  <!-- Captive Portal -->
  <rect x="490" y="236" width="340" height="100" rx="9" fill="url(#card)" stroke="#7c3aed" stroke-width="1.8"/>
  <rect x="490" y="236" width="340" height="4" rx="3" fill="#7c3aed"/>
  <text x="660" y="263" text-anchor="middle" fill="#4c1d95" font-size="12" font-weight="700">Captive Portal</text>
  <text x="660" y="281" text-anchor="middle" fill="#64748b" font-size="9.5">Click-to-connect · anonymous guest session</text>
  <text x="660" y="298" text-anchor="middle" fill="#64748b" font-size="9">Idle timeout: 30 min · Hard timeout: 8 hr</text>
  <text x="660" y="325" text-anchor="middle" fill="#7c3aed" font-size="8" font-style="italic">session aligned with DHCP lease window</text>

  <!-- Blocked arrow: OPNsense to Internal -->
  <line x1="780" y1="156" x2="900" y2="280" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrRed)"/>

  <!-- Internal blocked -->
  <rect x="830" y="236" width="230" height="100" rx="9" fill="url(#card)" stroke="#dc2626" stroke-width="1.6"/>
  <rect x="830" y="236" width="230" height="4" rx="3" fill="#dc2626"/>
  <text x="945" y="263" text-anchor="middle" fill="#7f1d1d" font-size="12" font-weight="700">Internal Network</text>
  <text x="945" y="281" text-anchor="middle" fill="#64748b" font-size="9.5">Management · Storage · Apps</text>
  <text x="945" y="298" text-anchor="middle" fill="#64748b" font-size="9">Private VLANs</text>
  <text x="945" y="325" text-anchor="middle" fill="#dc2626" font-size="8" font-style="italic">BLOCKED — RFC1918 unreachable</text>

  <!-- Root cause -->
  <rect x="40" y="236" width="430" height="100" rx="9" fill="url(#card)" stroke="#d97706" stroke-width="1.4"/>
  <rect x="40" y="236" width="430" height="4" rx="3" fill="#d97706"/>
  <text x="255" y="261" text-anchor="middle" fill="#92400e" font-size="11" font-weight="700">Root Cause Found and Fixed</text>
  <text x="255" y="279" text-anchor="middle" fill="#64748b" font-size="9">Portal zone was bound to Network Services interface</text>
  <text x="255" y="296" text-anchor="middle" fill="#64748b" font-size="9">instead of the actual Guest interface (opt8)</text>
  <text x="255" y="313" text-anchor="middle" fill="#94a3b8" font-size="8.5">Clients could bypass portal — fix: rebind Guest_Portal to opt8</text>
  <text x="255" y="325" text-anchor="middle" fill="#94a3b8" font-size="8" font-style="italic">reconfigured captive portal service after binding update</text>

  <!-- Validation checklist -->
  <rect x="40" y="360" width="1020" height="130" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.2"/>
  <rect x="40" y="360" width="1020" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="387" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700">Validation Checklist</text>

  <rect x="70" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#16a34a" stroke-width="1.3"/>
  <rect x="70" y="400" width="220" height="4" rx="3" fill="#16a34a"/>
  <text x="180" y="422" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">Guest DHCP Lease</text>
  <text x="180" y="440" text-anchor="middle" fill="#64748b" font-size="8.5">Client receives guest pool address</text>

  <rect x="310" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#16a34a" stroke-width="1.3"/>
  <rect x="310" y="400" width="220" height="4" rx="3" fill="#16a34a"/>
  <text x="420" y="422" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">Portal Session Active</text>
  <text x="420" y="440" text-anchor="middle" fill="#64748b" font-size="8.5">Anonymous session in Guest zone</text>

  <rect x="550" y="400" width="220" height="48" rx="8" fill="url(#card)" stroke="#16a34a" stroke-width="1.3"/>
  <rect x="550" y="400" width="220" height="4" rx="3" fill="#16a34a"/>
  <text x="660" y="422" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">Internet Access</text>
  <text x="660" y="440" text-anchor="middle" fill="#64748b" font-size="8.5">WAN reachable after auth</text>

  <rect x="790" y="400" width="250" height="48" rx="8" fill="url(#card)" stroke="#dc2626" stroke-width="1.3"/>
  <rect x="790" y="400" width="250" height="4" rx="3" fill="#dc2626"/>
  <text x="915" y="422" text-anchor="middle" fill="#7f1d1d" font-size="10" font-weight="700">Internal Blocked</text>
  <text x="915" y="440" text-anchor="middle" fill="#64748b" font-size="8.5">Private VLANs unreachable from guest</text>

  <text x="550" y="478" text-anchor="middle" fill="#94a3b8" font-size="8" font-style="italic">Stale bypass sessions cleared · old DHCP artifacts on wrong interface removed · portal service reconfigured</text>

  <!-- Footer -->
  <rect x="40" y="510" width="1020" height="50" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="532" text-anchor="middle" fill="#94a3b8" font-size="8.5">Traffic path: Guest Device → Guest SSID (VLAN 8) → OPNsense Guest_Portal zone → Captive Portal auth → Internet</text>
  <text x="550" y="549" text-anchor="middle" fill="#cbd5e1" font-size="8" font-style="italic">Public-safe diagram · private addressing, subnet details, and host IPs omitted</text>
</svg>
