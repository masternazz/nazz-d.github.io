<svg data-diagram-theme="light" width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf5ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2563eb" stroke-width="0.45" opacity="0.18"/>
    </pattern>
    <marker id="arrowCyan" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowAmber" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#1e293b" font-size="17" font-weight="700" letter-spacing="1.4">Self-Hosted AI Gateway</text>
  <text x="490" y="54" text-anchor="middle" fill="#64748b" font-size="10">Telegram and email routed to Claude, Gemini CLI, or Codex — with git ops, streaming, and memory</text>

  <!-- Input channels row -->
  <rect x="38" y="82" width="172" height="96" rx="10" fill="url(#card)" stroke="#06b6d4" stroke-width="1.5"/>
  <rect x="38" y="82" width="172" height="5" rx="4" fill="#06b6d4"/>
  <text x="124" y="112" text-anchor="middle" fill="#0891b2" font-size="12" font-weight="700">Telegram</text>
  <text x="124" y="132" text-anchor="middle" fill="#334155" font-size="10">Webhook via Cloudflare</text>
  <text x="124" y="150" text-anchor="middle" fill="#334155" font-size="10">Tunnel — single allowed</text>
  <text x="124" y="168" text-anchor="middle" fill="#94a3b8" font-size="9">user ID + secret token</text>

  <rect x="38" y="196" width="172" height="80" rx="10" fill="url(#card)" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="38" y="196" width="172" height="5" rx="4" fill="#0d9488"/>
  <text x="124" y="222" text-anchor="middle" fill="#0f766e" font-size="12" font-weight="700">Email (IMAP)</text>
  <text x="124" y="242" text-anchor="middle" fill="#334155" font-size="10">Polled via imapflow</text>
  <text x="124" y="260" text-anchor="middle" fill="#94a3b8" font-size="9">domain allowlist filter</text>

  <!-- Arrows into gateway -->
  <line x1="210" y1="130" x2="270" y2="175" stroke="#06b6d4" stroke-width="1.8" marker-end="url(#arrowCyan)"/>
  <line x1="210" y1="236" x2="270" y2="195" stroke="#0d9488" stroke-width="1.8" marker-end="url(#arrowCyan)"/>

  <!-- Gateway core -->
  <rect x="270" y="82" width="300" height="194" rx="12" fill="url(#card)" stroke="#7c3aed" stroke-width="2"/>
  <rect x="270" y="82" width="300" height="5" rx="4" fill="#7c3aed"/>
  <text x="420" y="110" text-anchor="middle" fill="#6d28d9" font-size="14" font-weight="700">AI Gateway (Node.js)</text>
  <text x="420" y="133" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Parser</text>
  <text x="420" y="151" text-anchor="middle" fill="#64748b" font-size="9.5">engine prefix · verbose flag · git op phrases</text>
  <text x="420" y="170" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Git Ops (simple-git)</text>
  <text x="420" y="188" text-anchor="middle" fill="#64748b" font-size="9.5">pull · push · commit · diff · log — SSH key auth</text>
  <text x="420" y="207" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="600">Memory + History</text>
  <text x="420" y="225" text-anchor="middle" fill="#64748b" font-size="9.5">memory.md + per-channel JSON — prepended to every prompt</text>
  <text x="420" y="250" text-anchor="middle" fill="#94a3b8" font-size="9">Proxmox LXC · Express · Cloudflare Tunnel</text>
  <text x="420" y="266" text-anchor="middle" fill="#94a3b8" font-size="9">5-min timeout · clone race lock</text>

  <!-- Arrow into AI engines -->
  <line x1="570" y1="179" x2="628" y2="179" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="599" y="169" text-anchor="middle" fill="#6d28d9" font-size="9">spawn CLI</text>

  <!-- AI Engines -->
  <rect x="628" y="82" width="162" height="194" rx="10" fill="#e8f0ff" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="628" y="82" width="162" height="5" rx="4" fill="url(#bar)"/>
  <text x="709" y="110" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700">AI Engines</text>

  <rect x="644" y="120" width="130" height="42" rx="7" fill="url(#card)" stroke="#06b6d4" stroke-width="1.2"/>
  <text x="709" y="138" text-anchor="middle" fill="#0891b2" font-size="11" font-weight="600">Claude</text>
  <text x="709" y="154" text-anchor="middle" fill="#94a3b8" font-size="8.5">--print stdin prompt</text>

  <rect x="644" y="172" width="130" height="42" rx="7" fill="url(#card)" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="709" y="190" text-anchor="middle" fill="#6d28d9" font-size="11" font-weight="600">Gemini CLI</text>
  <text x="709" y="206" text-anchor="middle" fill="#94a3b8" font-size="8.5">--yolo -p arg</text>

  <rect x="644" y="224" width="130" height="42" rx="7" fill="url(#card)" stroke="#d97706" stroke-width="1.2"/>
  <text x="709" y="242" text-anchor="middle" fill="#b45309" font-size="11" font-weight="600">Codex</text>
  <text x="709" y="258" text-anchor="middle" fill="#94a3b8" font-size="8.5">--quiet stdin prompt</text>

  <!-- Streaming output down -->
  <line x1="709" y1="276" x2="709" y2="316" stroke="#d97706" stroke-width="1.8" marker-end="url(#arrowAmber)"/>

  <!-- Output row -->
  <rect x="580" y="316" width="258" height="80" rx="10" fill="url(#card)" stroke="#d97706" stroke-width="1.5"/>
  <rect x="580" y="316" width="258" height="5" rx="4" fill="#d97706"/>
  <text x="709" y="342" text-anchor="middle" fill="#b45309" font-size="12" font-weight="700">Streaming Output</text>
  <text x="709" y="362" text-anchor="middle" fill="#334155" font-size="10">Telegram: live message edits every 1.5s</text>
  <text x="709" y="380" text-anchor="middle" fill="#94a3b8" font-size="9">Email: SMTP reply on process close</text>

  <!-- Git context down from gateway -->
  <line x1="420" y1="276" x2="420" y2="316" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrowPurple)"/>

  <!-- Bottom feature boxes -->
  <rect x="60" y="316" width="188" height="80" rx="10" fill="url(#card)" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="60" y="316" width="188" height="5" rx="4" fill="#16a34a"/>
  <text x="154" y="342" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">Git Integration</text>
  <text x="154" y="362" text-anchor="middle" fill="#334155" font-size="10">SSH key auth · clone lock</text>
  <text x="154" y="380" text-anchor="middle" fill="#94a3b8" font-size="9">auto log-fetch after pull</text>

  <rect x="262" y="316" width="204" height="80" rx="10" fill="url(#card)" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="262" y="316" width="204" height="5" rx="4" fill="#7c3aed"/>
  <text x="364" y="342" text-anchor="middle" fill="#6d28d9" font-size="12" font-weight="700">Context Pipeline</text>
  <text x="364" y="362" text-anchor="middle" fill="#334155" font-size="10">git context + memory + history</text>
  <text x="364" y="380" text-anchor="middle" fill="#94a3b8" font-size="9">aiPrompt strips git phrases</text>

  <!-- Legend / summary bar -->
  <rect x="60" y="432" width="860" height="80" rx="12" fill="#e8f0ff" stroke="#cbd5e1" stroke-width="1.2"/>
  <rect x="60" y="432" width="860" height="5" rx="4" fill="url(#bar)"/>
  <text x="490" y="458" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="700">Message Format Examples</text>
  <text x="200" y="482" text-anchor="middle" fill="#0891b2" font-size="9">Default (Claude): ask anything</text>
  <text x="200" y="499" text-anchor="middle" fill="#94a3b8" font-size="9">gemini: or codex: prefix</text>
  <text x="490" y="482" text-anchor="middle" fill="#6d28d9" font-size="9">pull my-docs and tell me the last commit</text>
  <text x="490" y="499" text-anchor="middle" fill="#94a3b8" font-size="9">git ops run first, log injected as context</text>
  <text x="780" y="482" text-anchor="middle" fill="#b45309" font-size="9">verbose: streams debug output live</text>
  <text x="780" y="499" text-anchor="middle" fill="#94a3b8" font-size="9">memory: fact — saves to shared file</text>
</svg>
