<svg data-diagram-theme="light" width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#edf5ff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f7ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2563eb" stroke-width="0.45" opacity="0.18"/>
    </pattern>
    <marker id="arrowGood" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowWarn" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#1e293b" font-size="17" font-weight="700" letter-spacing="1.2">Legacy DMZ Trunking Path Fix</text>
  <text x="490" y="54" text-anchor="middle" fill="#64748b" font-size="10">Public-safe view of the troubleshooting path; exact interfaces and addresses are omitted</text>

  <rect x="58" y="92" width="864" height="140" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/>
  <rect x="58" y="92" width="864" height="5" rx="4" fill="#f97316"/>
  <text x="490" y="120" text-anchor="middle" fill="#c2410c" font-size="13" font-weight="700">Failure Mode</text>
  <text x="490" y="140" text-anchor="middle" fill="#64748b" font-size="10">The cloudflared container was tagged for the legacy DMZ, but one trunk in the path did not carry that VLAN.</text>

  <g fill="url(#card)" stroke="#ea580c" stroke-width="1.4">
    <rect x="90" y="162" width="150" height="48" rx="8"/>
    <rect x="305" y="162" width="150" height="48" rx="8"/>
    <rect x="520" y="162" width="150" height="48" rx="8"/>
    <rect x="735" y="162" width="150" height="48" rx="8"/>
  </g>
  <text x="165" y="191" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">OPNsense DMZ</text>
  <text x="380" y="191" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Core Trunk</text>
  <text x="595" y="191" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Access Trunk</text>
  <text x="810" y="191" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Proxmox LXC</text>
  <line x1="240" y1="186" x2="301" y2="186" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowWarn)"/>
  <line x1="455" y1="186" x2="516" y2="186" stroke="#dc2626" stroke-width="2" stroke-dasharray="7,4"/>
  <line x1="670" y1="186" x2="731" y2="186" stroke="#ea580c" stroke-width="2" marker-end="url(#arrowWarn)"/>
  <text x="486" y="176" text-anchor="middle" fill="#b91c1c" font-size="9">DMZ tag missing here</text>

  <rect x="58" y="276" width="864" height="185" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
  <rect x="58" y="276" width="864" height="5" rx="4" fill="#16a34a"/>
  <text x="490" y="304" text-anchor="middle" fill="#15803d" font-size="13" font-weight="700">Corrected Path</text>
  <text x="490" y="324" text-anchor="middle" fill="#64748b" font-size="10">Every trunk that participates in the DMZ path explicitly carries the VLAN tag end to end.</text>

  <g fill="url(#card)" stroke="#16a34a" stroke-width="1.4">
    <rect x="90" y="354" width="150" height="55" rx="8"/>
    <rect x="305" y="354" width="150" height="55" rx="8"/>
    <rect x="520" y="354" width="150" height="55" rx="8"/>
    <rect x="735" y="354" width="150" height="55" rx="8"/>
  </g>
  <text x="165" y="379" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Gateway</text>
  <text x="165" y="396" text-anchor="middle" fill="#64748b" font-size="9">DHCP + policy</text>
  <text x="380" y="379" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Core Switch</text>
  <text x="380" y="396" text-anchor="middle" fill="#64748b" font-size="9">DMZ tagged</text>
  <text x="595" y="379" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">Access Switch</text>
  <text x="595" y="396" text-anchor="middle" fill="#64748b" font-size="9">DMZ tagged</text>
  <text x="810" y="379" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="700">cloudflared</text>
  <text x="810" y="396" text-anchor="middle" fill="#64748b" font-size="9">tunnel healthy</text>
  <line x1="240" y1="382" x2="301" y2="382" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGood)"/>
  <line x1="455" y1="382" x2="516" y2="382" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGood)"/>
  <line x1="670" y1="382" x2="731" y2="382" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGood)"/>

  <rect x="144" y="488" width="692" height="34" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="490" y="509" text-anchor="middle" fill="#475569" font-size="10">Validation: DMZ lease received, gateway reachable, tunnel registers, public ingress returns.</text>
</svg>
