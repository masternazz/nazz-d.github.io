<svg width="980" height="560" viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182235"/>
      <stop offset="100%" stop-color="#0c111d"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.25"/>
    </pattern>
    <marker id="arrowIn" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowOut" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="url(#bg)"/>
  <rect width="980" height="560" fill="url(#grid)"/>
  <rect x="0" y="0" width="980" height="5" fill="url(#bar)"/>

  <text x="490" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.4">Self-Hosted Email Routing</text>
  <text x="490" y="54" text-anchor="middle" fill="#94a3b8" font-size="10">Cloudflare receives standard SMTP; home receives only a sanitized non-standard listener</text>

  <rect x="45" y="86" width="890" height="190" rx="12" fill="#0b1220" stroke="#164e63" stroke-width="1.2"/>
  <rect x="45" y="86" width="890" height="5" rx="4" fill="#22d3ee"/>
  <text x="490" y="114" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="700">Inbound Path</text>

  <g fill="url(#card)" stroke-width="1.4">
    <rect x="75" y="145" width="132" height="74" rx="9" stroke="#22d3ee"/>
    <rect x="255" y="145" width="132" height="74" rx="9" stroke="#22d3ee"/>
    <rect x="435" y="145" width="132" height="74" rx="9" stroke="#8b5cf6"/>
    <rect x="615" y="145" width="132" height="74" rx="9" stroke="#f59e0b"/>
    <rect x="795" y="145" width="110" height="74" rx="9" stroke="#14b8a6"/>
  </g>
  <text x="141" y="174" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Sender</text>
  <text x="141" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">External mail</text>
  <text x="321" y="174" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Cloudflare MX</text>
  <text x="321" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">standard SMTP</text>
  <text x="501" y="174" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Email Worker</text>
  <text x="501" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">TCP socket bridge</text>
  <text x="681" y="174" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">OPNsense NAT</text>
  <text x="681" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">approved listener</text>
  <text x="850" y="174" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">mailcow</text>
  <text x="850" y="194" text-anchor="middle" fill="#94a3b8" font-size="9">SOGo inbox</text>

  <line x1="207" y1="182" x2="251" y2="182" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowIn)"/>
  <line x1="387" y1="182" x2="431" y2="182" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowIn)"/>
  <line x1="567" y1="182" x2="611" y2="182" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowIn)"/>
  <line x1="747" y1="182" x2="791" y2="182" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowIn)"/>
  <text x="590" y="163" text-anchor="middle" fill="#c4b5fd" font-size="8">[mail-host]:[listener]</text>

  <rect x="45" y="315" width="890" height="170" rx="12" fill="#0b1220" stroke="#7c2d12" stroke-width="1.2"/>
  <rect x="45" y="315" width="890" height="5" rx="4" fill="#f59e0b"/>
  <text x="490" y="343" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">Outbound Path</text>

  <g fill="url(#card)" stroke-width="1.4">
    <rect x="105" y="378" width="150" height="70" rx="9" stroke="#14b8a6"/>
    <rect x="330" y="378" width="150" height="70" rx="9" stroke="#8b5cf6"/>
    <rect x="555" y="378" width="150" height="70" rx="9" stroke="#f59e0b"/>
    <rect x="780" y="378" width="105" height="70" rx="9" stroke="#22d3ee"/>
  </g>
  <text x="180" y="406" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">SOGo</text>
  <text x="180" y="426" text-anchor="middle" fill="#94a3b8" font-size="9">user sends mail</text>
  <text x="405" y="406" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Postfix</text>
  <text x="405" y="426" text-anchor="middle" fill="#94a3b8" font-size="9">authenticated submit</text>
  <text x="630" y="406" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">SMTP2GO</text>
  <text x="630" y="426" text-anchor="middle" fill="#94a3b8" font-size="9">TLS relay</text>
  <text x="833" y="406" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">Recipient</text>
  <text x="833" y="426" text-anchor="middle" fill="#94a3b8" font-size="9">remote inbox</text>

  <line x1="255" y1="413" x2="326" y2="413" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowIn)"/>
  <line x1="480" y1="413" x2="551" y2="413" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOut)"/>
  <line x1="705" y1="413" x2="776" y2="413" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOut)"/>

  <rect x="165" y="505" width="650" height="34" rx="8" fill="#101827" stroke="#475569" stroke-width="1"/>
  <text x="490" y="526" text-anchor="middle" fill="#cbd5e1" font-size="10">Security note: exact ports, internal targets, and NAT rule values are intentionally omitted from the public diagram.</text>
</svg>
