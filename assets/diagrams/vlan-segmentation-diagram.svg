<svg width="1100" height="740" viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a18"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="35%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9333ea" stroke-width="0.15" opacity="0.22"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#9333ea" opacity="0.9"/>
    </marker>
    <marker id="arrteal" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#14b8a6" opacity="0.9"/>
    </marker>
  </defs>

  <rect width="1100" height="740" fill="url(#bg)"/>
  <rect width="1100" height="740" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#purpleBar)"/>

  <text x="550" y="34" text-anchor="middle" fill="#e2d9f3" font-size="15" font-weight="700" letter-spacing="2">10-VLAN PRODUCTION SEGMENTATION</text>
  <text x="550" y="52" text-anchor="middle" fill="#4b4266" font-size="10" letter-spacing="1">Role-based isolation · OPNsense default-deny · 802.1Q trunking throughout</text>

  <!-- OPNsense top bar -->
  <rect x="60" y="66" width="980" height="68" rx="9" fill="url(#card)" stroke="#9333ea" stroke-width="2" filter="url(#glow)"/>
  <rect x="60" y="66" width="980" height="4" rx="3" fill="url(#purpleBar)"/>
  <text x="550" y="90" text-anchor="middle" fill="#f6f3ff" font-size="13" font-weight="700">OPNsense Firewall</text>
  <text x="550" y="108" text-anchor="middle" fill="#7c6a99" font-size="9.5">Default-deny between all VLANs · explicit allow rules for each service path · AdGuard DNS · Suricata IDS</text>
  <text x="550" y="124" text-anchor="middle" fill="#4b3f66" font-size="9">WAN on dedicated NIC · all VLAN traffic on trunk · no flat-network bypass possible</text>

  <!-- Row 2 dashed vertical connectors drawn FIRST so trunk bus and row-1 cards cover them -->
  <g opacity="0.55" stroke-dasharray="4,3">
    <line x1="155" y1="156" x2="155" y2="330" stroke="#f59e0b" stroke-width="1.2"/>
    <line x1="363" y1="156" x2="363" y2="330" stroke="#22c55e" stroke-width="1.2"/>
    <line x1="571" y1="156" x2="571" y2="330" stroke="#a3a3a3" stroke-width="1.2"/>
    <line x1="779" y1="156" x2="779" y2="330" stroke="#ec4899" stroke-width="1.2"/>
    <line x1="976" y1="156" x2="976" y2="330" stroke="#fb923c" stroke-width="1.2"/>
  </g>

  <!-- Trunk bus (drawn after dashed lines so it covers their tops) -->
  <rect x="80" y="156" width="940" height="18" rx="9" fill="#1f2937" stroke="#4b3f66" stroke-width="1"/>
  <text x="550" y="169" text-anchor="middle" fill="#6b5a99" font-size="8.5" font-weight="700" letter-spacing="1.5">802.1Q TRUNK BUS — ALL VLANS TAGGED</text>

  <!-- Row 1 solid connectors (bus bottom to card top) drawn BEFORE row-1 cards -->
  <g opacity="0.7">
    <line x1="155" y1="174" x2="155" y2="194" stroke="#3b82f6" stroke-width="1.3"/>
    <line x1="363" y1="174" x2="363" y2="194" stroke="#8b5cf6" stroke-width="1.3"/>
    <line x1="571" y1="174" x2="571" y2="194" stroke="#14b8a6" stroke-width="1.3"/>
    <line x1="779" y1="174" x2="779" y2="194" stroke="#06b6d4" stroke-width="1.3"/>
    <line x1="976" y1="174" x2="976" y2="194" stroke="#ef4444" stroke-width="1.3"/>
  </g>

  <!-- Row 1 VLAN cards -->
  <!-- VLAN 10 Management -->
  <rect x="60" y="194" width="190" height="112" rx="8" fill="url(#card)" stroke="#3b82f6" stroke-width="1.6"/>
  <rect x="60" y="194" width="190" height="4" rx="3" fill="#3b82f6"/>
  <text x="155" y="218" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">VLAN 10 — Management</text>
  <text x="155" y="236" text-anchor="middle" fill="#4b6b9e" font-size="8.5">10.226.10.0/24</text>
  <text x="155" y="252" text-anchor="middle" fill="#7a9ecf" font-size="8.5">OPNsense · Proxmox nodes</text>
  <text x="155" y="268" text-anchor="middle" fill="#7a9ecf" font-size="8.5">Core + access switches</text>
  <text x="155" y="284" text-anchor="middle" fill="#7a9ecf" font-size="8.5">Admin PC · Ubiquiti AP</text>
  <text x="155" y="299" text-anchor="middle" fill="#3b82f6" font-size="7.5" font-style="italic">admin-initiated access only</text>

  <!-- VLAN 6 Internal Services -->
  <rect x="268" y="194" width="190" height="112" rx="8" fill="url(#card)" stroke="#8b5cf6" stroke-width="1.6"/>
  <rect x="268" y="194" width="190" height="4" rx="3" fill="#8b5cf6"/>
  <text x="363" y="218" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">VLAN 6 — Services</text>
  <text x="363" y="236" text-anchor="middle" fill="#5c4a8a" font-size="8.5">10.226.6.0/24</text>
  <text x="363" y="252" text-anchor="middle" fill="#9b85d4" font-size="8.5">Authentik · Mailcow</text>
  <text x="363" y="268" text-anchor="middle" fill="#9b85d4" font-size="8.5">Jellyfin · Dashboards</text>
  <text x="363" y="284" text-anchor="middle" fill="#9b85d4" font-size="8.5">Home Assistant</text>
  <text x="363" y="299" text-anchor="middle" fill="#8b5cf6" font-size="7.5" font-style="italic">proxy-mediated access</text>

  <!-- VLAN 7 DMZ -->
  <rect x="476" y="194" width="190" height="112" rx="8" fill="url(#card)" stroke="#14b8a6" stroke-width="1.6"/>
  <rect x="476" y="194" width="190" height="4" rx="3" fill="#14b8a6"/>
  <text x="571" y="218" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">VLAN 7 — DMZ</text>
  <text x="571" y="236" text-anchor="middle" fill="#286b62" font-size="8.5">10.226.7.0/24</text>
  <text x="571" y="252" text-anchor="middle" fill="#4caea4" font-size="8.5">Cloudflare Tunnel LXC</text>
  <text x="571" y="268" text-anchor="middle" fill="#4caea4" font-size="8.5">NPMplus reverse proxy</text>
  <text x="571" y="284" text-anchor="middle" fill="#4caea4" font-size="8.5">MCP Server LXC</text>
  <text x="571" y="299" text-anchor="middle" fill="#14b8a6" font-size="7.5" font-style="italic">approved backends only</text>

  <!-- VLAN 5 Storage -->
  <rect x="684" y="194" width="190" height="112" rx="8" fill="url(#card)" stroke="#06b6d4" stroke-width="1.6"/>
  <rect x="684" y="194" width="190" height="4" rx="3" fill="#06b6d4"/>
  <text x="779" y="218" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">VLAN 5 — Storage</text>
  <text x="779" y="236" text-anchor="middle" fill="#1a5a6b" font-size="8.5">10.226.5.0/24</text>
  <text x="779" y="252" text-anchor="middle" fill="#4fb8cd" font-size="8.5">TrueNAS · NFS shares</text>
  <text x="779" y="268" text-anchor="middle" fill="#4fb8cd" font-size="8.5">PBS backup target</text>
  <text x="779" y="284" text-anchor="middle" fill="#4fb8cd" font-size="8.5">Media library storage</text>
  <text x="779" y="299" text-anchor="middle" fill="#06b6d4" font-size="7.5" font-style="italic">no internet initiation</text>

  <!-- VLAN 20 SIEM -->
  <rect x="892" y="194" width="168" height="112" rx="8" fill="url(#card)" stroke="#ef4444" stroke-width="1.6"/>
  <rect x="892" y="194" width="168" height="4" rx="3" fill="#ef4444"/>
  <text x="976" y="218" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">VLAN 20 — SIEM</text>
  <text x="976" y="236" text-anchor="middle" fill="#6b1a1a" font-size="8.5">10.226.20.0/24</text>
  <text x="976" y="252" text-anchor="middle" fill="#d97171" font-size="8.5">Wazuh Manager</text>
  <text x="976" y="268" text-anchor="middle" fill="#d97171" font-size="8.5">Log aggregation</text>
  <text x="976" y="284" text-anchor="middle" fill="#d97171" font-size="8.5">Agent syslog paths</text>
  <text x="976" y="299" text-anchor="middle" fill="#ef4444" font-size="7.5" font-style="italic">collection paths only</text>

  <!-- Row 2 VLAN cards (drawn after dashed lines, so lines go behind) -->
  <!-- VLAN 2 Game Servers -->
  <rect x="60" y="330" width="190" height="112" rx="8" fill="url(#card)" stroke="#f59e0b" stroke-width="1.6"/>
  <rect x="60" y="330" width="190" height="4" rx="3" fill="#f59e0b"/>
  <text x="155" y="354" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">VLAN 2 — Game Servers</text>
  <text x="155" y="372" text-anchor="middle" fill="#8a6c20" font-size="8.5">10.226.2.0/24</text>
  <text x="155" y="388" text-anchor="middle" fill="#c9a84c" font-size="8.5">Pelican Panel</text>
  <text x="155" y="404" text-anchor="middle" fill="#c9a84c" font-size="8.5">Wings · mc-bot</text>
  <text x="155" y="420" text-anchor="middle" fill="#c9a84c" font-size="8.5">Minecraft instances</text>
  <text x="155" y="436" text-anchor="middle" fill="#f59e0b" font-size="7.5" font-style="italic">public game ports · no internal reach</text>

  <!-- VLAN 4 IoT -->
  <rect x="268" y="330" width="190" height="112" rx="8" fill="url(#card)" stroke="#22c55e" stroke-width="1.6"/>
  <rect x="268" y="330" width="190" height="4" rx="3" fill="#22c55e"/>
  <text x="363" y="354" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">VLAN 4 — IoT</text>
  <text x="363" y="372" text-anchor="middle" fill="#1a5a28" font-size="8.5">10.226.4.0/24</text>
  <text x="363" y="388" text-anchor="middle" fill="#5ab87a" font-size="8.5">Smart home devices</text>
  <text x="363" y="404" text-anchor="middle" fill="#5ab87a" font-size="8.5">IP cameras</text>
  <text x="363" y="420" text-anchor="middle" fill="#5ab87a" font-size="8.5">PoE sensors</text>
  <text x="363" y="436" text-anchor="middle" fill="#22c55e" font-size="7.5" font-style="italic">internet only · RFC1918 blocked</text>

  <!-- VLAN 9 Testing -->
  <rect x="476" y="330" width="190" height="112" rx="8" fill="url(#card)" stroke="#a3a3a3" stroke-width="1.6"/>
  <rect x="476" y="330" width="190" height="4" rx="3" fill="#a3a3a3"/>
  <text x="571" y="354" text-anchor="middle" fill="#d4d4d4" font-size="11" font-weight="700">VLAN 9 — Testing</text>
  <text x="571" y="372" text-anchor="middle" fill="#525252" font-size="8.5">10.226.9.0/24</text>
  <text x="571" y="388" text-anchor="middle" fill="#8a8a8a" font-size="8.5">Sandbox workloads</text>
  <text x="571" y="404" text-anchor="middle" fill="#8a8a8a" font-size="8.5">Lab VMs and LXCs</text>
  <text x="571" y="420" text-anchor="middle" fill="#8a8a8a" font-size="8.5">Isolated experiments</text>
  <text x="571" y="436" text-anchor="middle" fill="#a3a3a3" font-size="7.5" font-style="italic">isolated lab space</text>

  <!-- VLAN 3 Guest -->
  <rect x="684" y="330" width="190" height="112" rx="8" fill="url(#card)" stroke="#ec4899" stroke-width="1.6"/>
  <rect x="684" y="330" width="190" height="4" rx="3" fill="#ec4899"/>
  <text x="779" y="354" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700">VLAN 3 — Guest</text>
  <text x="779" y="372" text-anchor="middle" fill="#6b1a42" font-size="8.5">10.226.3.0/24</text>
  <text x="779" y="388" text-anchor="middle" fill="#c06090" font-size="8.5">Visitor Wi-Fi</text>
  <text x="779" y="404" text-anchor="middle" fill="#c06090" font-size="8.5">Isolated clients</text>
  <text x="779" y="420" text-anchor="middle" fill="#c06090" font-size="8.5">No lab access</text>
  <text x="779" y="436" text-anchor="middle" fill="#ec4899" font-size="7.5" font-style="italic">RFC1918 blocked · internet only</text>

  <!-- VLAN 99 OOB -->
  <rect x="892" y="330" width="168" height="112" rx="8" fill="url(#card)" stroke="#fb923c" stroke-width="1.6"/>
  <rect x="892" y="330" width="168" height="4" rx="3" fill="#fb923c"/>
  <text x="976" y="354" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">VLAN 99 — OOB</text>
  <text x="976" y="372" text-anchor="middle" fill="#6b3010" font-size="8.5">10.226.99.0/24</text>
  <text x="976" y="388" text-anchor="middle" fill="#d07040" font-size="8.5">Break-glass access</text>
  <text x="976" y="404" text-anchor="middle" fill="#d07040" font-size="8.5">Emergency mgmt</text>
  <text x="976" y="420" text-anchor="middle" fill="#d07040" font-size="8.5">OOB console</text>
  <text x="976" y="436" text-anchor="middle" fill="#fb923c" font-size="7.5" font-style="italic">restricted · break-glass only</text>

  <!-- Documented allow paths section -->
  <rect x="60" y="466" width="980" height="120" rx="12" fill="#0b1220" stroke="#2d1f44" stroke-width="1.2"/>
  <rect x="60" y="466" width="980" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="492" text-anchor="middle" fill="#e2d9f3" font-size="12" font-weight="700">Documented Allow Paths (Public-Safe Summary)</text>
  <text x="165" y="520" text-anchor="middle" fill="#5eead4" font-size="9">DMZ → approved backends through NPMplus</text>
  <text x="165" y="538" text-anchor="middle" fill="#4caea4" font-size="8.5">Cloudflare Tunnel terminates in VLAN 7</text>
  <text x="165" y="555" text-anchor="middle" fill="#286b62" font-size="8.5">Proxy traffic flows to VLAN 6 services</text>
  <text x="430" y="520" text-anchor="middle" fill="#93c5fd" font-size="9">Management → all VLANs (admin only)</text>
  <text x="430" y="538" text-anchor="middle" fill="#4b6b9e" font-size="8.5">Full reach for emergency + maintenance</text>
  <text x="430" y="555" text-anchor="middle" fill="#2a3f66" font-size="8.5">Restricted to admin workstation IP</text>
  <text x="700" y="520" text-anchor="middle" fill="#fca5a5" font-size="9">All zones → SIEM log collection</text>
  <text x="700" y="538" text-anchor="middle" fill="#d97171" font-size="8.5">Scoped syslog + agent paths only</text>
  <text x="700" y="555" text-anchor="middle" fill="#6b1a1a" font-size="8.5">No return path from SIEM outward</text>
  <text x="940" y="520" text-anchor="middle" fill="#86efac" font-size="9">IoT / Guest → internet only</text>
  <text x="940" y="538" text-anchor="middle" fill="#5ab87a" font-size="8.5">RFC1918 blocked at firewall</text>
  <text x="940" y="555" text-anchor="middle" fill="#1a5a28" font-size="8.5">No lateral movement possible</text>

  <text x="550" y="577" text-anchor="middle" fill="#4b3f66" font-size="8" font-style="italic">Exact subnet addresses, host IPs, and rule sequence numbers omitted for public-safety</text>
</svg>
