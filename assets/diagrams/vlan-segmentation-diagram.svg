<svg width="1100" height="720" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#030208"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172033"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="35%" stop-color="#8b5cf6"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#334155" stroke-width="0.45" opacity="0.24"/>
    </pattern>
    <marker id="arrowPurple" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowTeal" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L0,9 L9,4.5 Z" fill="#14b8a6"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="url(#bg)"/>
  <rect width="1100" height="720" fill="url(#grid)"/>
  <rect x="0" y="0" width="1100" height="5" fill="url(#bar)"/>

  <text x="550" y="34" text-anchor="middle" fill="#e5e7eb" font-size="17" font-weight="700" letter-spacing="1.5">Public-Safe VLAN Segmentation Model</text>
  <text x="550" y="55" text-anchor="middle" fill="#94a3b8" font-size="10">Role-based private subnets, OPNsense default-deny, and explicit service paths</text>

  <rect x="60" y="82" width="200" height="70" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="60" y="82" width="200" height="5" rx="4" fill="#22d3ee"/>
  <text x="160" y="111" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">Internet / ISP</text>
  <text x="160" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">WAN uplink only</text>

  <rect x="360" y="82" width="380" height="70" rx="10" fill="url(#card)" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="360" y="82" width="380" height="5" rx="4" fill="#8b5cf6"/>
  <text x="550" y="110" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">OPNsense Firewall</text>
  <text x="550" y="129" text-anchor="middle" fill="#94a3b8" font-size="9">Default-deny between VLANs; allow only documented flows</text>

  <rect x="840" y="82" width="200" height="70" rx="10" fill="url(#card)" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="840" y="82" width="200" height="5" rx="4" fill="#6366f1"/>
  <text x="940" y="111" text-anchor="middle" fill="#a5b4fc" font-size="12" font-weight="700">Switching Fabric</text>
  <text x="940" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">Core + access trunks</text>

  <line x1="260" y1="117" x2="356" y2="117" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <line x1="740" y1="117" x2="836" y2="117" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <rect x="85" y="188" width="930" height="20" rx="10" fill="#1f2937" stroke="#475569" stroke-width="1"/>
  <text x="550" y="202" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="1.2">802.1Q TRUNK BUS - ROLE-BASED PRIVATE VLANs</text>

  <g fill="url(#card)" stroke-width="1.4">
    <rect x="40" y="250" width="190" height="96" rx="9" stroke="#3b82f6"/>
    <rect x="250" y="250" width="190" height="96" rx="9" stroke="#14b8a6"/>
    <rect x="460" y="250" width="190" height="96" rx="9" stroke="#8b5cf6"/>
    <rect x="670" y="250" width="190" height="96" rx="9" stroke="#06b6d4"/>
    <rect x="880" y="250" width="180" height="96" rx="9" stroke="#ef4444"/>
    <rect x="40" y="398" width="190" height="96" rx="9" stroke="#f59e0b"/>
    <rect x="250" y="398" width="190" height="96" rx="9" stroke="#22c55e"/>
    <rect x="460" y="398" width="190" height="96" rx="9" stroke="#a3a3a3"/>
    <rect x="670" y="398" width="190" height="96" rx="9" stroke="#ec4899"/>
    <rect x="880" y="398" width="180" height="96" rx="9" stroke="#fb923c"/>
  </g>

  <text x="135" y="279" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">Management</text>
  <text x="135" y="300" text-anchor="middle" fill="#cbd5e1" font-size="9">firewall, switches, Proxmox</text>
  <text x="135" y="318" text-anchor="middle" fill="#64748b" font-size="8">admin initiated access</text>
  <text x="345" y="279" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="700">DMZ</text>
  <text x="345" y="300" text-anchor="middle" fill="#cbd5e1" font-size="9">tunnel and reverse proxy</text>
  <text x="345" y="318" text-anchor="middle" fill="#64748b" font-size="8">approved backends only</text>
  <text x="555" y="279" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">Services</text>
  <text x="555" y="300" text-anchor="middle" fill="#cbd5e1" font-size="9">identity, media, dashboards</text>
  <text x="555" y="318" text-anchor="middle" fill="#64748b" font-size="8">proxy-mediated access</text>
  <text x="765" y="279" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">Storage</text>
  <text x="765" y="300" text-anchor="middle" fill="#cbd5e1" font-size="9">NAS and backup targets</text>
  <text x="765" y="318" text-anchor="middle" fill="#64748b" font-size="8">no internet initiation</text>
  <text x="970" y="279" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">Server / SIEM</text>
  <text x="970" y="300" text-anchor="middle" fill="#cbd5e1" font-size="9">log collection</text>
  <text x="970" y="318" text-anchor="middle" fill="#64748b" font-size="8">agent/syslog paths</text>

  <text x="135" y="427" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">Game Servers</text>
  <text x="135" y="448" text-anchor="middle" fill="#cbd5e1" font-size="9">public game services</text>
  <text x="135" y="466" text-anchor="middle" fill="#64748b" font-size="8">internal access blocked</text>
  <text x="345" y="427" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">IoT</text>
  <text x="345" y="448" text-anchor="middle" fill="#cbd5e1" font-size="9">smart devices</text>
  <text x="345" y="466" text-anchor="middle" fill="#64748b" font-size="8">internet only</text>
  <text x="555" y="427" text-anchor="middle" fill="#d4d4d4" font-size="11" font-weight="700">Testing</text>
  <text x="555" y="448" text-anchor="middle" fill="#cbd5e1" font-size="9">sandbox workloads</text>
  <text x="555" y="466" text-anchor="middle" fill="#64748b" font-size="8">isolated lab space</text>
  <text x="765" y="427" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700">Guest</text>
  <text x="765" y="448" text-anchor="middle" fill="#cbd5e1" font-size="9">visitor Wi-Fi</text>
  <text x="765" y="466" text-anchor="middle" fill="#64748b" font-size="8">RFC1918 blocked</text>
  <text x="970" y="427" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">OOB / Network</text>
  <text x="970" y="448" text-anchor="middle" fill="#cbd5e1" font-size="9">break-glass access</text>
  <text x="970" y="466" text-anchor="middle" fill="#64748b" font-size="8">restricted management</text>

  <line x1="550" y1="208" x2="550" y2="228" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="135" y1="228" x2="970" y2="228" stroke="#8b5cf6" stroke-width="1.2" opacity="0.55"/>
  <g stroke-width="1.2" opacity="0.65">
    <line x1="135" y1="228" x2="135" y2="250" stroke="#3b82f6"/>
    <line x1="345" y1="228" x2="345" y2="250" stroke="#14b8a6"/>
    <line x1="555" y1="228" x2="555" y2="250" stroke="#8b5cf6"/>
    <line x1="765" y1="228" x2="765" y2="250" stroke="#06b6d4"/>
    <line x1="970" y1="228" x2="970" y2="250" stroke="#ef4444"/>
    <line x1="135" y1="228" x2="135" y2="398" stroke="#f59e0b" stroke-dasharray="4,4"/>
    <line x1="345" y1="228" x2="345" y2="398" stroke="#22c55e" stroke-dasharray="4,4"/>
    <line x1="555" y1="228" x2="555" y2="398" stroke="#a3a3a3" stroke-dasharray="4,4"/>
    <line x1="765" y1="228" x2="765" y2="398" stroke="#ec4899" stroke-dasharray="4,4"/>
    <line x1="970" y1="228" x2="970" y2="398" stroke="#fb923c" stroke-dasharray="4,4"/>
  </g>

  <rect x="80" y="545" width="940" height="100" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="545" width="940" height="5" rx="4" fill="url(#bar)"/>
  <text x="550" y="574" text-anchor="middle" fill="#e5e7eb" font-size="12" font-weight="700">Documented Allow Paths</text>
  <text x="124" y="604" fill="#5eead4" font-size="9">DMZ -> approved service backends through reverse proxy</text>
  <text x="124" y="624" fill="#93c5fd" font-size="9">Management -> admin interfaces and emergency maintenance paths</text>
  <text x="476" y="604" fill="#fca5a5" font-size="9">All zones -> SIEM log collection through scoped rules</text>
  <text x="476" y="624" fill="#67e8f9" font-size="9">Proxmox -> storage targets for backup and media mounts</text>
  <text x="800" y="604" fill="#f9a8d4" font-size="9">Guest/IoT/testing -> internet only, private ranges blocked</text>
  <text x="800" y="624" fill="#94a3b8" font-size="9">Exact subnets, host addresses, and rule IDs omitted publicly</text>
</svg>
